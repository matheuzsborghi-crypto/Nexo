<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2064%2064%22%3E%3Cpath%20d%3D%22M16%2050V14L48%2050V14%22%20fill%3D%22none%22%20stroke%3D%22%23E07A5F%22%20stroke-width%3D%228%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%2F%3E%3C%2Fsvg%3E" />
    <title>Nexo</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
(() => {
  const CONFIG_KEY = "nexo_github_sync_config";
  const SHA_KEY = "nexo_github_sync_sha";
  const originalFetch = window.fetch.bind(window);

  function loadConfig() {
    try { return JSON.parse(localStorage.getItem(CONFIG_KEY) || "null"); } catch { return null; }
  }

  function saveConfig(config) {
    localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
  }

  function encodeUtf8Base64(text) {
    const bytes = new TextEncoder().encode(text);
    let binary = "";
    bytes.forEach((byte) => { binary += String.fromCharCode(byte); });
    return btoa(binary);
  }

  function decodeUtf8Base64(base64) {
    const binary = atob(String(base64 || "").replace(/\n/g, ""));
    const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
    return new TextDecoder().decode(bytes);
  }

  const GIST_DESCRIPTION = "Nexo HTML Sync Database";
  const GIST_FILE_NAME = "data-nexo.json";

  async function githubRequest(config, url, options = {}) {
    const headers = {
      Accept: "application/vnd.github+json",
      "X-GitHub-Api-Version": "2022-11-28",
      ...(options.headers || {}),
    };
    if (config.token) headers.Authorization = `Bearer ${config.token}`;
    return originalFetch(url, { ...options, headers });
  }

  async function findNexoGist(config) {
    const cachedId = localStorage.getItem(SHA_KEY) || "";
    if (cachedId) {
      const cached = await githubRequest(config, `https://api.github.com/gists/${cachedId}`, { cache: "no-store" });
      if (cached.ok) return cached.json();
      localStorage.removeItem(SHA_KEY);
    }

    const response = await githubRequest(config, "https://api.github.com/gists?per_page=100", { cache: "no-store" });
    if (!response.ok) throw new Error(`GitHub Gist search failed (${response.status})`);
    const gists = await response.json();
    const gist = Array.isArray(gists)
      ? gists.find((item) => item.description === GIST_DESCRIPTION && item.files && item.files[GIST_FILE_NAME])
      : null;
    if (gist?.id) {
      localStorage.setItem(SHA_KEY, gist.id);
      const full = await githubRequest(config, `https://api.github.com/gists/${gist.id}`, { cache: "no-store" });
      if (!full.ok) throw new Error(`GitHub Gist read failed (${full.status})`);
      return full.json();
    }
    return null;
  }

  async function readGistPayload(config) {
    const gist = await findNexoGist(config);
    if (!gist) return { exists: false, fileName: GIST_FILE_NAME, payload: null };
    const file = gist.files?.[GIST_FILE_NAME];
    if (!file) return { exists: false, fileName: GIST_FILE_NAME, payload: null };
    let text = file.content || "";
    if (file.truncated && file.raw_url) {
      const raw = await githubRequest(config, file.raw_url, { cache: "no-store" });
      if (!raw.ok) throw new Error(`GitHub Gist raw read failed (${raw.status})`);
      text = await raw.text();
    }
    const payload = text.trim() ? JSON.parse(text) : null;
    return { exists: true, fileName: GIST_FILE_NAME, payload };
  }

  async function writeGistPayload(config, payload) {
    const content = JSON.stringify(payload, null, 2);
    const gist = await findNexoGist(config);
    const body = {
      description: GIST_DESCRIPTION,
      public: false,
      files: { [GIST_FILE_NAME]: { content } },
    };
    const url = gist?.id ? `https://api.github.com/gists/${gist.id}` : "https://api.github.com/gists";
    const response = await githubRequest(config, url, {
      method: gist?.id ? "PATCH" : "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    if (!response.ok) {
      const details = await response.text().catch(() => "");
      throw new Error(`GitHub Gist write failed (${response.status}) ${details}`);
    }
    const data = await response.json();
    if (data?.id) localStorage.setItem(SHA_KEY, data.id);
    return { ok: true, fileName: GIST_FILE_NAME };
  }
  function jsonResponse(body, status = 200) {
    return new Response(JSON.stringify(body), {
      status,
      headers: { "Content-Type": "application/json; charset=utf-8" },
    });
  }

  window.fetch = async (input, init = {}) => {
    const url = typeof input === "string" ? input : input?.url;
    const method = String(init?.method || input?.method || "GET").toUpperCase();
    if (url === "/api/sync/status") {
      const config = loadConfig();
      if (!config?.token) return jsonResponse({ available: false, mode: "gist", exists: false }, 503);
      return jsonResponse({ available: true, mode: "gist", fileName: GIST_FILE_NAME, exists: true });
    }
    if (url === "/api/sync/data") {
      const config = loadConfig();
      if (!config?.token) return jsonResponse({ error: "GitHub Gist sync is not configured" }, 503);
      try {
        if (method === "GET") return jsonResponse(await readGistPayload(config));
        if (method === "PUT") return jsonResponse(await writeGistPayload(config, JSON.parse(init.body || "null")));
        return jsonResponse({ error: "Method Not Allowed" }, 405);
      } catch (error) {
        console.error(error);
        return jsonResponse({ error: String(error?.message || error) }, 500);
      }
    }
    return originalFetch(input, init);
  };

  function mountPanel() {
    if (document.getElementById("nexo-github-panel")) return;
    const panel = document.createElement("div");
    panel.id = "nexo-github-panel";
    panel.innerHTML = `
      <button type="button" class="nexo-gh-toggle" title="GitHub sync">GitHub</button>
      <form class="nexo-gh-form" hidden>
        <strong>GitHub Gist sync</strong>
        <input name="token" type="password" placeholder="GitHub token with Gist access" autocomplete="off" />
        <div class="nexo-gh-actions">
          <button type="submit">Save</button>
          <button type="button" data-clear>Clear</button>
        </div>
        <button type="button" class="nexo-gh-import" data-import>Import JSON to Gist</button>
        <button type="button" class="nexo-gh-import" data-reveal-token>Reveal Token</button>
        <input type="file" data-import-file accept=".json,application/json" hidden />
        <small>Nexo will create or reuse a secret Gist named Nexo HTML Sync Database.</small>
      </form>`;
    document.body.appendChild(panel);
    const form = panel.querySelector("form");
    const config = loadConfig() || {};
    form.elements.token.value = config.token || "";
    panel.querySelector(".nexo-gh-toggle").addEventListener("click", () => { form.hidden = !form.hidden; });
    panel.querySelector("[data-clear]").addEventListener("click", () => {
      localStorage.removeItem(CONFIG_KEY);
      localStorage.removeItem(SHA_KEY);
      alert("GitHub sync settings cleared. Reloading Nexo.");
      location.reload();
    });
    const importInput = panel.querySelector("[data-import-file]");
    panel.querySelector("[data-reveal-token]").addEventListener("click", async () => {
      const typedToken = form.elements.token.value.trim();
      if (typedToken) saveConfig({ token: typedToken });
      const savedToken = loadConfig()?.token || "";
      if (!savedToken) {
        alert("No GitHub token is saved in this browser yet.");
        return;
      }
      const shouldReveal = confirm("Reveal your saved GitHub token? Only do this on a device you trust.");
      if (!shouldReveal) return;
      try { await navigator.clipboard?.writeText(savedToken); } catch {}
      prompt("Saved GitHub token. It was copied if your browser allowed it:", savedToken);
    });
    panel.querySelector("[data-import]").addEventListener("click", () => {
      const typedToken = form.elements.token.value.trim();
      if (typedToken) saveConfig({ token: typedToken });
      const configForImport = loadConfig();
      if (!configForImport?.token) {
        alert("Save your GitHub Gist token before importing the old Nexo JSON file.");
        return;
      }
      importInput.click();
    });
    importInput.addEventListener("change", async () => {
      const file = importInput.files?.[0];
      importInput.value = "";
      if (!file) return;
      try {
        const text = await file.text();
        const payload = JSON.parse(text);
        if (!payload || typeof payload !== "object" || !payload.data) {
          alert("This does not look like a Nexo sync JSON file.");
          return;
        }
        await writeGistPayload(loadConfig(), payload);
        alert("Old Nexo data imported to GitHub Gist. Nexo will reload and pull it now.");
        location.reload();
      } catch (error) {
        console.error(error);
        alert(`Could not import JSON: ${error?.message || error}`);
      }
    });
    form.addEventListener("submit", (event) => {
      event.preventDefault();
      saveConfig({ token: form.elements.token.value.trim() });
      alert("GitHub sync settings saved. Nexo will reload now.");
      location.reload();
    });
  }

  function mountAboutTutorial() {
    const existingCard = document.getElementById("nexo-github-tutorial");
    const title = Array.from(document.querySelectorAll(".page-title")).find((node) => node.textContent.trim() === "Options");
    if (!title) {
      existingCard?.remove();
      return;
    }
    const main = title.closest("main") || document.querySelector("main");
    if (!main) return;
    let card = document.getElementById("nexo-github-tutorial");
    if (!card) {
      card = document.createElement("div");
      card.id = "nexo-github-tutorial";
      card.className = "card nexo-gh-tutorial";
      card.innerHTML = `
      <div class="nexo-gh-tutorial-head">
        <div>
          <h2>Information Syncronize Setup</h2>
          <p>Create one GitHub token so this HTML can store your Nexo information.</p>
        </div>
        <button type="button" class="btn btn-outline nexo-gh-open-panel">Open GitHub Panel</button>
      </div>
      <div class="nexo-gh-stepbox">
        <h3>Step by step</h3>
        <ol>
          <li>Create or sign in to your GitHub account at <a href="https://github.com/signup" target="_blank" rel="noreferrer">github.com/signup</a>.</li>
          <li>Open <a href="https://github.com/settings/tokens" target="_blank" rel="noreferrer">github.com/settings/tokens</a>.</li>
          <li>Click <strong>Generate new token</strong>, then choose <strong>Generate new token (classic)</strong>.</li>
          <li>In <strong>Note</strong>, write something like <strong>Personal Finance</strong>.</li>
          <li>In <strong>Expiration</strong>, choose <strong>No expiration</strong>.</li>
          <li>In <strong>Select scopes</strong>, mark only <strong>gist</strong>.</li>
          <li>Click <strong>Generate token</strong> and copy the token immediately. GitHub shows it only once.</li>
          <li>Return to Nexo, click the floating <strong>GitHub</strong> button, paste the token, and save.</li>
        </ol>
      </div>`;
    }
    const directCards = Array.from(main.children).filter((child) => child.classList?.contains("card") && child.id !== "nexo-github-tutorial");
    const anchor = directCards.find((child) => child.querySelector(".card-title")?.textContent.trim() === "Sync File") || directCards[0];
    if (anchor && card.previousElementSibling !== anchor) anchor.after(card);
    else if (!anchor && card.parentElement !== main) main.appendChild(card);
    const openButton = card.querySelector(".nexo-gh-open-panel");
    openButton?.addEventListener("click", () => {
      const form = document.querySelector("#nexo-github-panel .nexo-gh-form");
      if (form) form.hidden = false;
    });
  }


  function cleanOptionsSyncPanel() {
    const title = Array.from(document.querySelectorAll(".page-title")).find((node) => node.textContent.trim() === "Options");
    if (!title) return;
    const main = title.closest("main") || document.querySelector("main");
    if (!main) return;

    Array.from(main.querySelectorAll(".card-title")).forEach((node) => {
      if (node.textContent.trim() === "Launcher Shortcut File") {
        const card = node.closest(".card");
        if (card) card.style.display = "none";
      }
    });

    Array.from(main.querySelectorAll(".card")).forEach((card) => {
      const titleNode = card.querySelector(".card-title");
      if (titleNode?.textContent.trim() !== "Sync File") return;
      Array.from(card.querySelectorAll("div")).forEach((node) => {
        if (/^File:\s*/.test(node.textContent.trim())) node.style.display = "none";
      });
    });
  }
  function watchAboutTutorial() {
    mountAboutTutorial();
    cleanOptionsSyncPanel();
    const observer = new MutationObserver(() => { mountAboutTutorial(); cleanOptionsSyncPanel(); });
    observer.observe(document.body, { childList: true, subtree: true });
  }
  const style = document.createElement("style");
  style.textContent = `
    #nexo-github-panel{position:fixed;right:14px;bottom:14px;z-index:2147483647;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;color:#1f2937}
    .nexo-gh-toggle{border:0;border-radius:8px;background:#111827;color:#fff;padding:9px 12px;font-weight:700;box-shadow:0 10px 24px rgba(15,23,42,.22);cursor:pointer}
    .nexo-gh-form{position:absolute;right:0;bottom:44px;width:280px;padding:12px;border:1px solid #d7dde8;border-radius:8px;background:#fff;box-shadow:0 18px 42px rgba(15,23,42,.20)}
    .nexo-gh-form strong{display:block;font-size:13px;margin-bottom:8px}.nexo-gh-form input{width:100%;box-sizing:border-box;margin:4px 0;padding:8px;border:1px solid #cbd5e1;border-radius:6px;font-size:12px}.nexo-gh-actions{display:flex;gap:8px;margin-top:8px}.nexo-gh-actions button{flex:1;border:0;border-radius:6px;padding:8px;font-weight:700;cursor:pointer}.nexo-gh-actions button:first-child{background:#2563eb;color:#fff}.nexo-gh-actions button:last-child{background:#e5e7eb;color:#111827}.nexo-gh-import{width:100%;margin-top:8px;border:1px solid #cbd5e1;border-radius:6px;background:#fff;color:#111827;padding:8px;font-weight:700;cursor:pointer}.nexo-gh-form small{display:block;margin-top:8px;color:#64748b;line-height:1.35}
    .nexo-gh-tutorial{margin-top:12px}.nexo-gh-tutorial-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:14px}.nexo-gh-tutorial h2{margin:0;font-family:Fraunces,serif;font-size:24px;font-weight:700;color:var(--text)}.nexo-gh-tutorial p{margin:6px 0 0;color:var(--text-secondary);line-height:1.55;max-width:760px}.nexo-gh-stepbox{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-top:12px}.nexo-gh-stepbox h3{margin:0 0 10px;font-size:14px;font-weight:700;color:var(--text)}.nexo-gh-stepbox ol{margin:0;padding-left:22px;columns:2;column-gap:28px}.nexo-gh-stepbox li{break-inside:avoid;margin:7px 0;color:var(--text);line-height:1.45;font-size:14px}.nexo-gh-stepbox a{color:var(--accent);font-weight:600;text-decoration:underline}.nexo-gh-security{margin-top:12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--text-secondary);line-height:1.45;font-size:13px}.nexo-gh-security strong{color:var(--text)}.nexo-gh-fields{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-top:12px}.nexo-gh-fields div{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px}.nexo-gh-fields span{display:block;color:var(--text-secondary);font-size:12px;margin-bottom:4px}.nexo-gh-fields strong{display:block;color:var(--text);font-size:13px;line-height:1.35}.nexo-gh-open-panel{white-space:nowrap}@media (max-width:760px){.nexo-gh-tutorial-head{display:block}.nexo-gh-open-panel{margin-top:12px;width:100%}.nexo-gh-stepbox ol{columns:1}}
  `;
  document.head.appendChild(style);
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", () => { mountPanel(); watchAboutTutorial(); }); else { mountPanel(); watchAboutTutorial(); }
})();
    </script>

@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap');
:root {
  --bg: #FBF7F4; --surface: #FFFFFF; --surface-hover: #F9F5F2;
  --text: #2D2A26; --text-secondary: #7A756F; --border: #EDE8E3;
  --accent: #E07A5F; --accent-light: #FDF0ED;
  --shadow-sm: 0 1px 3px rgba(45,42,38,0.04), 0 1px 2px rgba(45,42,38,0.06);
  --shadow-md: 0 4px 16px rgba(45,42,38,0.06), 0 2px 6px rgba(45,42,38,0.04);
  --shadow-lg: 0 12px 40px rgba(45,42,38,0.08);
  --radius: 16px; --radius-sm: 10px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body, #root { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.app { display: flex; min-height: 100vh; }
.sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); padding: 28px 16px; display: flex; flex-direction: column; gap: 4px; position: fixed; top: 0; left: 0; height: 100vh; z-index: 10; }
.sidebar-brand { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 700; color: var(--accent); padding: 0 12px 24px; letter-spacing: -0.5px; }
.sidebar-brand-subline { margin-top: 2px; display: flex; align-items: center; gap: 6px; }
.sidebar-brand-subline span { font-size: 14px; color: var(--text-secondary); font-family: 'DM Sans', sans-serif; font-weight: 400; line-height: 1.2; }
.brand-edit-btn { width: 22px; height: 22px; border: 1px solid var(--border); border-radius: 7px; background: var(--surface); color: var(--text-secondary); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; }
.brand-edit-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.brand-edit-btn svg { width: 12px; height: 12px; }
.sync-card { margin: 0 8px 10px; padding: 10px; border: 1px solid var(--border); border-radius: 12px; background: var(--bg); }
.sync-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-secondary); font-weight: 600; margin-bottom: 6px; }
.sync-status { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; line-height: 1.35; }
.sync-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.sync-actions .btn { padding: 7px 10px; font-size: 12px; }
.nav-bottom { margin-top: auto; padding-top: 8px; border-top: 1px solid var(--border); }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.2s; font-size: 14.5px; font-weight: 500; color: var(--text-secondary); border: none; background: none; width: 100%; text-align: left; }
.nav-item:hover { background: var(--surface-hover); color: var(--text); }
.nav-item.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
.nav-item svg { width: 20px; height: 20px; flex-shrink: 0; }
.main { margin-left: 240px; flex: 1; padding: 32px 40px; max-width: 1100px; }
.page-title { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.5px; }
.page-sub { color: var(--text-secondary); font-size: 14.5px; margin-bottom: 28px; }
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
.stat-card { background: var(--surface); border-radius: var(--radius); padding: 20px 22px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); transition: transform 0.2s, box-shadow 0.2s; }
.stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.stat-label { font-size: 12.5px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 500; }
.stat-value { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 700; margin-top: 6px; letter-spacing: -0.5px; }
.stat-change { font-size: 12px; margin-top: 4px; font-weight: 500; }
.stat-change.up { color: #E07A5F; } .stat-change.down { color: #81B29A; }
.card { background: var(--surface); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); margin-bottom: 20px; }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
.card-title { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; }
.grid-2 { display: grid; grid-template-columns: 1.4fr 1fr; gap: 20px; }
.expense-row { display: flex; align-items: center; gap: 14px; padding: 13px 0; border-bottom: 1px solid var(--border); transition: background 0.15s; }
.expense-row:last-child { border-bottom: none; }
.expense-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.expense-info { flex: 1; min-width: 0; }
.expense-desc { font-weight: 500; font-size: 14px; }
.expense-meta { font-size: 12.5px; color: var(--text-secondary); margin-top: 2px; }
.expense-amount { font-family: 'Fraunces', serif; font-weight: 600; font-size: 16px; white-space: nowrap; }
.expense-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
.expense-row:hover .expense-actions { opacity: 1; }
.action-btn { width: 32px; height: 32px; border-radius: 8px; border: none; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); transition: all 0.15s; }
.action-btn:hover { background: var(--surface-hover); color: var(--text); }
.action-btn.del:hover { background: #FEE; color: #D44; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; border-radius: var(--radius-sm); border: none; font-family: 'DM Sans', sans-serif; font-size: 13.5px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: #c96a52; transform: translateY(-1px); box-shadow: var(--shadow-md); }
.btn-ghost { background: none; color: var(--text-secondary); }
.btn-ghost:hover { background: var(--surface-hover); color: var(--text); }
.btn-outline { background: none; border: 1.5px solid var(--border); color: var(--text); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.btn-danger { background: #FEE; color: #D44; border: 1px solid #FCC; }
.btn-danger:hover { background: #FDD; }
.modal-overlay { position: fixed; inset: 0; background: rgba(45,42,38,0.3); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 100; animation: fadeIn 0.2s; }
.modal { background: var(--surface); border-radius: 20px; padding: 32px; width: 480px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); animation: slideUp 0.25s ease-out; }
.modal h2 { font-family: 'Fraunces', serif; font-size: 22px; margin-bottom: 24px; }
.form-group { margin-bottom: 18px; }
.form-label { display: block; font-size: 12.5px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
.form-input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border 0.2s; background: var(--bg); }
.form-input:focus { border-color: var(--accent); }
select.form-input { cursor: pointer; }
.cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.cat-option { padding: 10px 6px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: none; cursor: pointer; text-align: center; font-size: 11.5px; font-weight: 500; transition: all 0.15s; font-family: 'DM Sans', sans-serif; color: var(--text-secondary); }
.cat-option:hover { border-color: #ccc; }
.cat-option.selected { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
.cat-option .ico { font-size: 20px; display: block; margin-bottom: 4px; }
.budget-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.budget-row:last-child { border-bottom: none; }
.budget-bar-bg { flex: 1; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; }
.budget-bar { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
.budget-label { width: 100px; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
.budget-nums { font-size: 12px; color: var(--text-secondary); width: 120px; text-align: right; white-space: nowrap; }
.tab-bar { display: flex; gap: 4px; background: var(--bg); border-radius: var(--radius-sm); padding: 4px; margin-bottom: 20px; width: fit-content; }
.tab { padding: 8px 16px; border-radius: 8px; border: none; background: none; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text-secondary); transition: all 0.15s; }
.tab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow-sm); }
.empty-state { text-align: center; padding: 48px 20px; color: var(--text-secondary); }
.empty-state .ico { font-size: 40px; margin-bottom: 12px; }
.upload-zone { border: 2px dashed var(--border); border-radius: var(--radius); padding: 32px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--bg); }
.upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: var(--accent-light); }
.upload-zone .ico { font-size: 36px; margin-bottom: 8px; }
.upload-zone p { font-size: 14px; color: var(--text-secondary); }
.upload-zone .hint { font-size: 12px; color: var(--text-secondary); margin-top: 6px; opacity: 0.7; }
.import-preview { max-height: 300px; overflow-y: auto; margin: 16px 0; }
.import-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.import-row:last-child { border-bottom: none; }
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border-radius: var(--radius-sm); padding: 14px 20px; box-shadow: var(--shadow-lg); border: 1px solid var(--border); animation: slideUp 0.3s ease-out; z-index: 200; display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 500; }
.tooltip-custom { background: var(--surface) !important; border: 1px solid var(--border) !important; border-radius: 10px !important; box-shadow: var(--shadow-md) !important; padding: 10px 14px !important; font-family: 'DM Sans', sans-serif !important; }
@keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
@keyframes slideUp { from { opacity: 0; transform: translateY(12px) } to { opacity: 1; transform: translateY(0) } }
@media (max-width: 900px) { .sidebar { display: none; } .main { margin-left: 0; padding: 20px; padding-top: 100px; } .stats-row { grid-template-columns: repeat(2, 1fr); } .grid-2 { grid-template-columns: 1fr; } }

  <script>
/* ── Nexo — Investments Dashboard Redesign ──────────────────────────────── */
(function () {
  'use strict';

  // ── Helpers ──────────────────────────────────────────────────────────────
  const ASSETS_KEY = 'nexo_investment_assets';
  const TXS_KEY    = 'nexo_investment_transactions';
  const FIXED_INCOME = new Set(['CDB','LCI','LCA','Fund']);

  function loadAssets()  { try { return JSON.parse(localStorage.getItem(ASSETS_KEY) || '[]'); } catch { return []; } }
  function loadTxs()     { try { return JSON.parse(localStorage.getItem(TXS_KEY) || '[]'); } catch { return []; } }

  // Carrega dados frescos do Gist para o localStorage antes de renderizar
  async function loadFromGist() {
    try {
      const resp = await fetch('/api/sync/data');
      if (!resp.ok) return;
      const json = await resp.json();
      const d = json && json.payload && json.payload.data;
      if (!d) return;
      if (Array.isArray(d.investmentAssets))
        localStorage.setItem(ASSETS_KEY, JSON.stringify(d.investmentAssets));
      if (Array.isArray(d.investmentTransactions))
        localStorage.setItem(TXS_KEY, JSON.stringify(d.investmentTransactions));
    } catch (e) {
      console.warn('[Nexo Dash] loadFromGist failed:', e);
    }
  }

  function fmtBRL(v, d) {
    if (v == null || isNaN(v)) return 'R$ —';
    const opts = { minimumFractionDigits: d ?? 2, maximumFractionDigits: d ?? 2 };
    return 'R$ ' + Math.abs(v).toLocaleString('pt-BR', opts);
  }
  function fmtPct(v) {
    if (v == null || isNaN(v)) return '—';
    return (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
  }
  function fmtK(v) {
    if (Math.abs(v) >= 1e6) return 'R$ ' + (v/1e6).toFixed(1) + 'M';
    if (Math.abs(v) >= 1e3) return 'R$ ' + (v/1e3).toFixed(1) + 'k';
    return 'R$ ' + v.toFixed(0);
  }
  function fmtDate(str) {
    if (!str) return '—';
    const [y,m,d] = str.split('-');
    return d+'/'+m+'/'+y;
  }
  function today() {
    const n = new Date();
    return n.toISOString().slice(0,10);
  }

  // ── Class colours ─────────────────────────────────────────────────────────
  const CLASS_COLORS = {
    'ETF':   'var(--accent, #E07A5F)',
    'CDB':   '#B58A3B',
    'LCI':   '#6B9E7A',
    'LCA':   '#5C8A6C',
    'Fund':  '#4C7A99',
    'Cash':  '#7A756F',
  };
  function classColor(cls) { return CLASS_COLORS[cls] || '#7A756F'; }

  // ── XIRR ─────────────────────────────────────────────────────────────────
  function computeXIRR(cashflows) {
    if (!cashflows || cashflows.length < 2) return null;
    const t0 = new Date(cashflows[0].date).getTime();
    function npv(r) {
      return cashflows.reduce((s, cf) => {
        const t = new Date(cf.date).getTime();
        const years = (t - t0) / (365.25 * 24 * 3600 * 1000);
        return s + cf.amount / Math.pow(1 + r, years);
      }, 0);
    }
    let lo = -0.999, hi = 100, mid = 0;
    for (let i = 0; i < 200; i++) {
      mid = (lo + hi) / 2;
      if (npv(mid) > 0) lo = mid; else hi = mid;
      if (hi - lo < 1e-8) break;
    }
    return isFinite(mid) ? mid : null;
  }

  // ── Portfolio calculations ────────────────────────────────────────────────
  function calcPortfolio() {
    const assets = loadAssets();
    const txs    = loadTxs();

    const result = assets.map(asset => {
      const myTxs = txs.filter(t => t.assetId === asset.id);
      const fi = FIXED_INCOME.has(asset.assetClass);

      let qtyNet = 0, firstBuyDate = null;
      let totalBuyQty = 0, weightedBuyCost = 0;
      let totalBuyAmt = 0, totalSellAmt = 0; // para fundos/renda fixa

      myTxs.forEach(t => {
        const d = t.date;
        if (t.type === 'buy' || t.type === 'adjustment') {
          const qty = parseFloat(t.quantity) || 1;
          const amt = parseFloat(t.amount)   || 0;
          qtyNet          += fi ? 0 : qty;   // fundos não contam qty
          weightedBuyCost += fi ? 0 : amt * qty;
          totalBuyQty     += fi ? 0 : qty;
          totalBuyAmt     += fi ? amt : 0;   // fundos: soma o valor total
          if (!firstBuyDate || d < firstBuyDate) firstBuyDate = d;
        } else if (t.type === 'sell') {
          const qty = parseFloat(t.quantity) || 1;
          const amt = parseFloat(t.amount)   || 0;
          qtyNet      -= fi ? 0 : qty;
          totalSellAmt += fi ? amt : 0;
        }
      });

      const manualPrice = parseFloat(asset.manualUnitPrice) || 0;
      let avgPrice, position, pl, costBasis;

      if (!fi) {
        // ETF: preço médio ponderado por qtd de cotas
        avgPrice  = totalBuyQty > 0 ? weightedBuyCost / totalBuyQty : 0;
        position  = qtyNet * manualPrice;
        pl        = (manualPrice - avgPrice) * qtyNet;
        costBasis = avgPrice * qtyNet;
      } else {
        // Fundo/renda fixa: capital líquido = Σbuys − Σsells
        const netInvested = totalBuyAmt - totalSellAmt;
        avgPrice  = netInvested;  // usado para exibir "Capital invested" no Dashboard
        position  = manualPrice;
        // Para renda fixa: P/L inclui cupons/dividendos recebidos
        const assetIncome = myTxs
          .filter(t => t.type === 'income')
          .reduce((s, t) => s + (parseFloat(t.amount) || 0), 0);
        pl        = (manualPrice - netInvested) + assetIncome;
        costBasis = netInvested;
      }

      return {
        ...asset,
        qtyNet, avgPrice, position, pl, costBasis,
        firstBuyDate,
        txs: myTxs,
        fi,
      };
    }).filter(a => a.position > 0 || a.qtyNet > 0);

    const totalPosition = result.reduce((s, a) => s + a.position, 0);
    result.forEach(a => { a.allocation = totalPosition > 0 ? (a.position / totalPosition) * 100 : 0; });

    // Income totals
    const allIncome = txs.filter(t => t.type === 'income');
    const totalIncome = allIncome.reduce((s,t) => s + (parseFloat(t.amount)||0), 0);
    const dividendCount = allIncome.filter(t => {
      const a = assets.find(x => x.id === t.assetId);
      return a && a.assetClass === 'Fund';
    }).length;
    const couponCount = allIncome.filter(t => {
      const a = assets.find(x => x.id === t.assetId);
      return a && a.assetClass !== 'Fund';
    }).length;

    // Total cost basis & P/L
    const totalCostBasis = result.reduce((s,a) => s + a.costBasis, 0);
    const totalPL        = result.reduce((s,a) => s + a.pl, 0);
    const totalPLpct     = totalCostBasis > 0 ? (totalPL / totalCostBasis) * 100 : 0;

    // XIRR cashflows
    const allTxsSorted = txs.slice().sort((a,b)=> a.date < b.date ? -1 : 1);
    const xirrCFs = allTxsSorted.map(t => {
      const amt = parseFloat(t.amount) || 0;
      const qty = parseFloat(t.quantity) || 1;
      const a   = assets.find(x => x.id === t.assetId);
      const fi2 = a ? FIXED_INCOME.has(a.assetClass) : false;
      let cash;
      if (t.type === 'buy' || t.type === 'adjustment') {
        cash = fi2 ? -amt : -(amt * qty);
      } else if (t.type === 'sell' || t.type === 'income') {
        cash = fi2 ? amt : (amt * qty);
      } else {
        cash = 0;
      }
      return { date: t.date, amount: cash };
    }).filter(c => c.amount !== 0);

    if (xirrCFs.length > 0 && totalPosition > 0) {
      xirrCFs.push({ date: today(), amount: +totalPosition });
    }

    const irr = xirrCFs.length >= 2 ? computeXIRR(xirrCFs) : null;
    const firstTxDate = allTxsSorted.length > 0 ? allTxsSorted[0].date : null;

    return {
      assets: result,
      totalPosition,
      totalIncome,
      dividendCount,
      couponCount,
      totalCostBasis,
      totalPL,
      totalPLpct,
      irr,
      firstTxDate,
      allTxs: txs,
    };
  }

  // ── State ─────────────────────────────────────────────────────────────────
  const state = { period: 'all', allocationView: 'class' };

  // ── Navigation ────────────────────────────────────────────────────────────
  function goToInvestmentsTx() {
    const btns = document.querySelectorAll('.sidebar button.nav-item');
    btns.forEach(btn => {
      let lbl = '';
      btn.childNodes.forEach(n => { if (n.nodeType === 3) lbl += n.textContent; });
      if (/trans/i.test(lbl) && /invest/i.test(lbl)) btn.click();
    });
  }

  // ── Flow chart data ───────────────────────────────────────────────────────
  function getFlowData(txs, assets, period) {
    const now = new Date();
    let fromDate;
    if (period === 'month') {
      fromDate = new Date(now.getFullYear(), now.getMonth(), 1);
    } else if (period === '30d') {
      fromDate = new Date(now.getTime() - 30*24*3600*1000);
    } else if (period === 'year') {
      fromDate = new Date(now.getFullYear(), 0, 1);
    } else {
      fromDate = null;
    }

    const filtered = txs.filter(t => !fromDate || t.date >= fromDate.toISOString().slice(0,10));

    const months = {};
    filtered.forEach(t => {
      const [y,m] = t.date.split('-');
      const key = y+'-'+m;
      if (!months[key]) months[key] = { buy: 0, income: 0, sell: 0, adj: 0 };
      const a   = assets.find(x => x.id === t.assetId);
      const fi  = a ? FIXED_INCOME.has(a.assetClass) : false;
      const amt = parseFloat(t.amount) || 0;
      const qty = parseFloat(t.quantity) || 1;
      const val = fi ? amt : amt * qty;
      if (t.type === 'buy')        months[key].buy    += val;
      else if (t.type === 'sell')  months[key].sell   += val;
      else if (t.type === 'income')months[key].income += amt;
      else if (t.type === 'adjustment') months[key].adj += val;
    });

    const sorted = Object.keys(months).sort();
    const totals = { buy:0, sell:0, income:0, adj:0 };
    filtered.forEach(t => {
      const a   = assets.find(x => x.id === t.assetId);
      const fi  = a ? FIXED_INCOME.has(a.assetClass) : false;
      const amt = parseFloat(t.amount) || 0;
      const qty = parseFloat(t.quantity) || 1;
      const val = fi ? amt : amt * qty;
      if (t.type === 'buy')         totals.buy    += val;
      else if (t.type === 'sell')   totals.sell   += val;
      else if (t.type === 'income') totals.income += amt;
      else if (t.type === 'adjustment') totals.adj += val;
    });

    return { monthKeys: sorted, months, totals };
  }

  // ── SVG Donut ─────────────────────────────────────────────────────────────
  function buildDonutSVG(segments, totalPosition) {
    const cx=120, cy=120, r=90, sw=28;
    const circ = 2*Math.PI*r;

    let offset = 0;
    const SEGS = segments.map(s => {
      const dash = (s.pct/100)*circ;
      const seg = { ...s, dash, offset };
      offset += dash;
      return seg;
    });

    const segPaths = SEGS.map((s,i) =>
      `<circle data-seg-i="${i}" data-seg-cls="${s.cls}" cx="${cx}" cy="${cy}" r="${r}"
        fill="none" stroke="${s.color}" stroke-width="${sw}"
        stroke-dasharray="${s.dash.toFixed(3)} ${(circ-s.dash).toFixed(3)}"
        stroke-dashoffset="${(circ/4 - s.offset).toFixed(3)}"
        style="transition:opacity .2s;cursor:pointer"
        transform="rotate(-90 ${cx} ${cy})"
      />`
    ).join('');

    const valStr  = totalPosition >= 1e6 ? (totalPosition/1e6).toFixed(1)+'M' : totalPosition >= 1e3 ? (totalPosition/1e3).toFixed(0)+'k' : totalPosition.toFixed(0);
    const nCls    = segments.length;

    return `<svg id="nx-dash-donut" viewBox="0 0 240 240" width="240" height="240" xmlns="http://www.w3.org/2000/svg">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--surface-hover,#f0ece8)" stroke-width="${sw}" />
      ${segPaths}
      <text x="${cx}" y="${cy-16}" text-anchor="middle" font-size="10" fill="var(--text-muted,#888)" font-family="inherit" letter-spacing="1">TOTAL</text>
      <text x="${cx}" y="${cy+2}" text-anchor="middle" font-size="16" fill="var(--text,#1a1a1a)" font-family="Fraunces,serif" font-weight="600">R$ ${valStr}</text>
      <text x="${cx}" y="${cy+18}" text-anchor="middle" font-size="10" fill="var(--text-muted,#888)" font-family="inherit">${nCls} classe${nCls!==1?'s':''}</text>
    </svg>`;
  }

  // ── Bar chart SVG ─────────────────────────────────────────────────────────
  function buildBarChartSVG(monthKeys, months) {
    if (!monthKeys.length) {
      return `<svg width="100%" height="220" xmlns="http://www.w3.org/2000/svg">
        <text x="50%" y="110" text-anchor="middle" fill="var(--text-muted,#888)" font-size="13">No data for this period</text>
      </svg>`;
    }

    const W=600, H=220, padL=52, padR=16, padT=16, padB=36;
    const chartW = W - padL - padR;
    const chartH = H - padT - padB;

    const maxVal = Math.max(1, ...monthKeys.map(k => (months[k].buy||0) + (months[k].adj||0) + (months[k].income||0)));
    const ticks  = [0, maxVal/2, maxVal];

    const slotW  = chartW / monthKeys.length;
    const barW   = Math.min(slotW * 0.55, 28);

    const MONTH_ABBR = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

    const bars = monthKeys.map((k, i) => {
      const mo   = months[k];
      const base = (mo.buy||0) + (mo.adj||0);
      const inc  = mo.income||0;
      const sell = mo.sell||0;
      const x    = padL + slotW*i + slotW/2;

      const hBase = (base/maxVal)*chartH;
      const hInc  = (inc/maxVal)*chartH;
      const hSell = (sell/maxVal)*chartH;

      const yBase = padT + chartH - hBase;
      const yInc  = yBase - hInc;

      const mo2   = months[k];
      const tt    = `${k}: Buy R$${(mo2.buy||0).toFixed(0)} Adj R$${(mo2.adj||0).toFixed(0)} Income R$${inc.toFixed(0)} Sell R$${sell.toFixed(0)}`;

      let rects = '';
      if (hBase > 0) rects += `<rect x="${(x - barW/2).toFixed(1)}" y="${yBase.toFixed(1)}" width="${barW.toFixed(1)}" height="${hBase.toFixed(1)}" rx="2" fill="var(--buy,#5C8A6C)" data-tooltip="${tt}" />`;
      if (hInc  > 0) rects += `<rect x="${(x - barW/2).toFixed(1)}" y="${yInc.toFixed(1)}" width="${barW.toFixed(1)}" height="${hInc.toFixed(1)}" rx="2" fill="#B58A3B" data-tooltip="${tt}" />`;
      if (hSell > 0) rects += `<rect x="${(x + barW/2 + 2).toFixed(1)}" y="${(padT+chartH - hSell).toFixed(1)}" width="${(barW*0.6).toFixed(1)}" height="${hSell.toFixed(1)}" rx="2" fill="var(--sell,#C0614A)" data-tooltip="${tt}" />`;

      const [yr,mo3] = k.split('-');
      const lbl = MONTH_ABBR[parseInt(mo3,10)-1] + (yr !== String(new Date().getFullYear()) ? ' '+yr.slice(2) : '');
      const xlbl = `<text x="${x.toFixed(1)}" y="${(H-padB+14).toFixed(1)}" text-anchor="middle" font-size="10" fill="var(--text-muted,#888)">${lbl}</text>`;

      return rects + xlbl;
    }).join('');

    const tickLines = ticks.map(v => {
      const y = padT + chartH - (v/maxVal)*chartH;
      return `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="var(--border,#e0dbd5)" stroke-width="1" stroke-dasharray="3 3"/>
        <text x="${(padL-4).toFixed(1)}" y="${(y+4).toFixed(1)}" text-anchor="end" font-size="9" fill="var(--text-muted,#888)">${fmtK(v)}</text>`;
    }).join('');

    return `<svg id="nx-dash-bars" viewBox="0 0 ${W} ${H}" width="100%" height="220" xmlns="http://www.w3.org/2000/svg" style="overflow:visible">
      ${tickLines}
      ${bars}
    </svg>`;
  }

  // ── Main render ───────────────────────────────────────────────────────────
  function renderPage() {
    const root = document.getElementById('nx-dash-root');
    if (!root) return;

    const data = calcPortfolio();
    const { assets, totalPosition, totalIncome, dividendCount, couponCount,
            totalCostBasis, totalPL, totalPLpct, irr, firstTxDate, allTxs } = data;

    // ── Empty state ──
    if (!assets.length) {
      root.innerHTML = `
        <div class="nx-dash-empty">
          <div class="nx-dash-empty-icon">📊</div>
          <h2>No investments yet</h2>
          <p>Start tracking your portfolio by adding your first transaction.</p>
          <button data-action="goto-tx" class="nx-dash-btn-accent">＋ Add your first transaction</button>
        </div>`;
      return;
    }

    // ── KPI Cards ──
    const plSign = totalPL >= 0 ? '+' : '−';
    const irrVal = irr != null ? (irr*100).toFixed(2)+'%' : '—';
    const irrSign = irr != null && irr >= 0 ? '+' : (irr != null ? '−' : '');
    const irrSub = firstTxDate
      ? `annualized · since ${fmtDate(firstTxDate)}`
      : 'not enough data yet';
    const irrDisplay = irr != null ? (irrSign + Math.abs(irr*100).toFixed(2)+'%') : '—';
    const irrColor   = irr != null ? (irr >= 0 ? 'var(--pos,#3a7d44)' : 'var(--neg,#b52b27)') : 'var(--text,#1a1a1a)';

    const plColor   = totalPL >= 0 ? 'var(--pos,#3a7d44)' : 'var(--neg,#b52b27)';
    const plPctPill = `<span class="nx-dash-pill ${totalPL>=0?'nx-dash-pill-pos':'nx-dash-pill-neg'}">${totalPL>=0?'▲':'▼'} ${Math.abs(totalPLpct).toFixed(2)}%</span>`;

    // ── Allocation by class ──
    const byClass = {};
    assets.forEach(a => {
      const cls = a.assetClass || 'Other';
      if (!byClass[cls]) byClass[cls] = { cls, color: classColor(cls), position: 0, assets: [] };
      byClass[cls].position += a.position;
      byClass[cls].assets.push(a);
    });
    const classSegs = Object.values(byClass)
      .sort((a,b) => b.position - a.position)
      .map(c => ({ ...c, pct: totalPosition > 0 ? (c.position/totalPosition)*100 : 0 }));

    const donutSVG = buildDonutSVG(classSegs, totalPosition);

    // Allocation list HTML
    let allocListHTML = '';
    if (state.allocationView === 'class') {
      classSegs.forEach(c => {
        allocListHTML += `
          <div class="nx-dash-alloc-row">
            <div class="nx-dash-dot" style="background:${c.color}"></div>
            <div class="nx-dash-alloc-info">
              <div class="nx-dash-alloc-name">${c.cls}</div>
              <div class="nx-dash-alloc-sub">${c.assets.length} asset${c.assets.length!==1?'s':''}</div>
              <div class="nx-dash-alloc-bar-wrap"><div class="nx-dash-alloc-bar" style="width:${c.pct.toFixed(1)}%;background:${c.color}"></div></div>
            </div>
            <div class="nx-dash-alloc-pct">${c.pct.toFixed(1)}%</div>
            <div class="nx-dash-alloc-val">${fmtBRL(c.position)}</div>
          </div>`;
      });
    } else {
      assets.slice().sort((a,b) => b.position - a.position).forEach(a => {
        const color = classColor(a.assetClass);
        allocListHTML += `
          <div class="nx-dash-alloc-row">
            <div class="nx-dash-dot" style="background:${color}"></div>
            <div class="nx-dash-alloc-info">
              <div class="nx-dash-alloc-name">${a.name}</div>
              <div class="nx-dash-alloc-sub">${a.assetClass}${a.ticker?' · '+a.ticker:''}</div>
              <div class="nx-dash-alloc-bar-wrap"><div class="nx-dash-alloc-bar" style="width:${a.allocation.toFixed(1)}%;background:${color}"></div></div>
            </div>
            <div class="nx-dash-alloc-pct">${a.allocation.toFixed(1)}%</div>
            <div class="nx-dash-alloc-val">${fmtBRL(a.position)}</div>
          </div>`;
      });
    }

    const nClasses  = classSegs.length;
    const allocToggleLabel = state.allocationView === 'class' ? 'By asset →' : 'By class →';

    // ── Holdings table ──
    const holdingsRows = assets.slice().sort((a,b) => b.position - a.position).map(a => {
      const plColor2 = a.pl >= 0 ? 'var(--pos,#3a7d44)' : 'var(--neg,#b52b27)';
      const plSign2  = a.pl >= 0 ? '+' : '−';
      const plPct2   = a.costBasis > 0 ? (a.pl / a.costBasis)*100 : 0;
      const clr = classColor(a.assetClass);
      const unit = a.fi ? 'units' : 'shares';
      const costLbl = a.fi ? 'per unit' : 'per share';
      return `
        <tr class="nx-dash-row" data-asset-id="${a.id}">
          <td class="nx-dash-td">
            <div class="nx-dash-asset-name">${a.name}</div>
            <div class="nx-dash-asset-sub">
              <span class="nx-dash-badge" style="background:${clr}22;color:${clr}">${a.assetClass}</span>
              ${a.ticker ? '<span class="nx-dash-ticker">'+a.ticker+'</span>' : ''}
              ${a.firstBuyDate ? '· since '+fmtDate(a.firstBuyDate) : ''}
            </div>
          </td>
          <td class="nx-dash-td nx-dash-right">
            <div class="nx-dash-tabnum">${a.qtyNet > 0 ? a.qtyNet.toFixed(a.fi?0:4) : '—'}</div>
            <div class="nx-dash-muted">${unit}</div>
          </td>
          <td class="nx-dash-td nx-dash-right">
            <div class="nx-dash-tabnum">${fmtBRL(a.avgPrice)}</div>
            <div class="nx-dash-muted">${costLbl}</div>
          </td>
          <td class="nx-dash-td nx-dash-right">
            <div><span class="nx-dash-muted">R$</span> <span style="font-family:Fraunces,serif;font-size:15.5px;font-weight:600">${Math.abs(a.position).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}</span></div>
          </td>
          <td class="nx-dash-td">
            <div style="display:flex;align-items:center;gap:8px">
              <div style="flex:1;height:6px;background:var(--surface-hover,#f0ece8);border-radius:999px;overflow:hidden">
                <div style="height:100%;width:${a.allocation.toFixed(1)}%;background:${clr};border-radius:999px"></div>
              </div>
              <span class="nx-dash-tabnum" style="min-width:42px;text-align:right">${a.allocation.toFixed(1)}%</span>
            </div>
          </td>
          <td class="nx-dash-td nx-dash-right">
            <div style="font-family:Fraunces,serif;font-weight:600;color:${plColor2}">${plSign2} ${fmtBRL(a.pl)}</div>
            <div class="nx-dash-muted">${plPct2>=0?'+':''}${plPct2.toFixed(2)}%</div>
          </td>
        </tr>`;
    }).join('');

    // ── Flows ──
    const allAssets = loadAssets();
    const { monthKeys, months, totals } = getFlowData(allTxs, allAssets, state.period);
    const barSVG = buildBarChartSVG(monthKeys, months);
    const netContrib = totals.buy + totals.adj - totals.sell;

    const periodBtns = ['month','30d','year','all'].map(p => {
      const labels = { month:'This month', '30d':'Last 30 days', year:'This year', all:'All' };
      const active = state.period === p ? ' nx-dash-period-active' : '';
      return `<button class="nx-dash-period-btn${active}" data-action="set-period" data-period="${p}">${labels[p]}</button>`;
    }).join('');

    root.innerHTML = `
      <div id="nx-dash-tooltip" style="display:none;position:fixed;z-index:9999;pointer-events:none;background:var(--surface,#fff);border:1px solid var(--border,#e0dbd5);border-radius:8px;padding:8px 12px;font-size:12px;box-shadow:0 4px 16px rgba(0,0,0,.12)"></div>

      <!-- Header -->
      <div class="nx-dash-header">
        <div>
          <h1 class="nx-dash-title">Investments Dashboard</h1>
          <p class="nx-dash-subtitle">Portfolio value, allocation, and performance — at a glance.</p>
        </div>
        <div class="nx-dash-header-actions">
          <button class="nx-dash-btn-outline" data-action="export">Export</button>
          <button class="nx-dash-btn-accent"  data-action="goto-tx">＋ Transaction</button>
        </div>
      </div>

      <!-- KPI Strip -->
      <div class="nx-dash-kpi-grid">
        <!-- Hero: Portfolio Value -->
        <div class="nx-dash-kpi nx-dash-kpi-hero">
          <div class="nx-dash-kpi-label">PORTFOLIO VALUE</div>
          <div class="nx-dash-kpi-value nx-dash-fraunces42">${fmtBRL(totalPosition)}</div>
          <div class="nx-dash-kpi-meta">
            ${plPctPill}
            <span class="nx-dash-pill ${totalPL>=0?'nx-dash-pill-pos':'nx-dash-pill-neg'}">${plSign} ${fmtBRL(totalPL)}</span>
            <span class="nx-dash-muted" style="font-size:12px">vs cost basis · ${fmtBRL(totalCostBasis)}</span>
          </div>
        </div>
        <!-- Income -->
        <div class="nx-dash-kpi">
          <div class="nx-dash-kpi-label">INCOME (ALL-TIME) <span class="nx-dash-info-icon" data-tooltip-text="Soma de dividendos e cupons recebidos em toda a história do portfolio">ⓘ</span></div>
          <div class="nx-dash-kpi-value nx-dash-fraunces28">${fmtBRL(totalIncome)}</div>
          <div class="nx-dash-kpi-meta nx-dash-muted" style="font-size:12px">${dividendCount} dividend${dividendCount!==1?'s':''} · ${couponCount} coupon${couponCount!==1?'s':''}</div>
        </div>
        <!-- Total P/L -->
        <div class="nx-dash-kpi">
          <div class="nx-dash-kpi-label">TOTAL P/L</div>
          <div class="nx-dash-kpi-value nx-dash-fraunces28" style="color:${plColor}">${fmtBRL(totalPL)}</div>
          <div class="nx-dash-kpi-meta">${plPctPill} <span class="nx-dash-muted" style="font-size:12px">unrealized</span></div>
        </div>
        <!-- IRR -->
        <div class="nx-dash-kpi">
          <div class="nx-dash-kpi-label">PORTFOLIO IRR <span class="nx-dash-info-icon" data-tooltip-text="Taxa interna de retorno anualizada, calculada sobre os fluxos de caixa do portfolio">ⓘ</span></div>
          <div class="nx-dash-kpi-value nx-dash-fraunces28" style="color:${irrColor}">${irrDisplay}</div>
          <div class="nx-dash-kpi-meta nx-dash-muted" style="font-size:12px">${irrSub}</div>
        </div>
      </div>

      <!-- Allocation -->
      <div class="nx-dash-card">
        <div class="nx-dash-card-header">
          <span class="nx-dash-card-title">Allocation</span>
          <span class="nx-dash-pill-neutral">${nClasses} classe${nClasses!==1?'s':''} · ${assets.length} asset${assets.length!==1?'s':''}</span>
          <button class="nx-dash-btn-ghost" data-action="toggle-alloc-view">${allocToggleLabel}</button>
        </div>
        <div class="nx-dash-alloc-grid">
          <div id="nx-dash-donut-wrap">${donutSVG}</div>
          <div class="nx-dash-alloc-list">${allocListHTML}</div>
        </div>
      </div>

      <!-- Holdings -->
      <div class="nx-dash-card">
        <div class="nx-dash-card-header">
          <span class="nx-dash-card-title">Holdings</span>
          <span class="nx-dash-pill-neutral">${assets.length} asset${assets.length!==1?'s':''} · sorted by value</span>
          <button class="nx-dash-btn-ghost" data-action="goto-tx">See all transactions →</button>
        </div>
        <div style="overflow-x:auto">
          <table class="nx-dash-table">
            <thead>
              <tr>
                <th class="nx-dash-th">Asset</th>
                <th class="nx-dash-th nx-dash-right">Quantity</th>
                <th class="nx-dash-th nx-dash-right">Avg cost</th>
                <th class="nx-dash-th nx-dash-right">Current value</th>
                <th class="nx-dash-th">Allocation</th>
                <th class="nx-dash-th nx-dash-right">P/L</th>
              </tr>
            </thead>
            <tbody>${holdingsRows}</tbody>
          </table>
        </div>
      </div>

      <!-- Investment Flows -->
      <div class="nx-dash-card">
        <div class="nx-dash-card-header">
          <span class="nx-dash-card-title">Investment flows</span>
          <span class="nx-dash-pill-neutral">Capital in/out and income · monthly</span>
          <div class="nx-dash-period-seg">${periodBtns}</div>
        </div>
        <div class="nx-dash-flows-grid">
          <div>${barSVG}</div>
          <div class="nx-dash-flows-tiles">
            <div class="nx-dash-tile">
              <div class="nx-dash-tile-label"><span class="nx-dash-dot" style="background:var(--accent,#E07A5F)"></span> Net contributions</div>
              <div class="nx-dash-tile-val">${fmtBRL(netContrib)}</div>
            </div>
            <div class="nx-dash-tile">
              <div class="nx-dash-tile-label"><span class="nx-dash-dot" style="background:var(--buy,#5C8A6C)"></span> Buys &amp; adjustments</div>
              <div class="nx-dash-tile-val">${fmtBRL(totals.buy + totals.adj)}</div>
            </div>
            <div class="nx-dash-tile">
              <div class="nx-dash-tile-label"><span class="nx-dash-dot" style="background:var(--sell,#C0614A)"></span> Sells</div>
              <div class="nx-dash-tile-val">${fmtBRL(totals.sell)}</div>
            </div>
            <div class="nx-dash-tile">
              <div class="nx-dash-tile-label"><span class="nx-dash-dot" style="background:#B58A3B"></span> Income</div>
              <div class="nx-dash-tile-val">${fmtBRL(totals.income)}</div>
            </div>
          </div>
        </div>
      </div>
    `;

    // ── Donut hover ──
    const donutEl = document.getElementById('nx-dash-donut');
    const tooltip  = document.getElementById('nx-dash-tooltip');
    if (donutEl && tooltip) {
      donutEl.addEventListener('mouseover', e => {
        const seg = e.target.closest('[data-seg-i]');
        if (!seg) return;
        const i = parseInt(seg.getAttribute('data-seg-i'), 10);
        const cls = classSegs[i];
        if (!cls) return;
        donutEl.querySelectorAll('[data-seg-i]').forEach((s, si) => {
          s.style.opacity = si === i ? '1' : '0.3';
        });
        tooltip.style.display = 'block';
        tooltip.innerHTML = `<b>${cls.cls}</b>: ${fmtBRL(cls.position)} (${cls.pct.toFixed(1)}%)`;
      });
      donutEl.addEventListener('mousemove', e => {
        if (tooltip.style.display === 'none') return;
        tooltip.style.left = (e.clientX + 14) + 'px';
        tooltip.style.top  = (e.clientY - 8) + 'px';
      });
      donutEl.addEventListener('mouseout', e => {
        if (!e.relatedTarget || !e.relatedTarget.closest('#nx-dash-donut')) {
          donutEl.querySelectorAll('[data-seg-i]').forEach(s => s.style.opacity = '1');
          tooltip.style.display = 'none';
        }
      });
    }

    // ── Bar chart hover ──
    const barEl = document.getElementById('nx-dash-bars');
    if (barEl && tooltip) {
      barEl.addEventListener('mouseover', e => {
        const bar = e.target.closest('[data-tooltip]');
        if (!bar) return;
        tooltip.style.display = 'block';
        tooltip.innerHTML = bar.getAttribute('data-tooltip').replace(/([A-Z][a-z]+)/g, '<b>$1</b>');
      });
      barEl.addEventListener('mousemove', e => {
        tooltip.style.left = (e.clientX + 14) + 'px';
        tooltip.style.top  = (e.clientY - 8) + 'px';
      });
      barEl.addEventListener('mouseout', () => { tooltip.style.display = 'none'; });
    }

    // ── Info icon tooltip ──
    root.querySelectorAll('.nx-dash-info-icon').forEach(el => {
      const txt = el.getAttribute('data-tooltip-text');
      el.addEventListener('mouseenter', e => {
        tooltip.style.display = 'block';
        tooltip.innerHTML = txt;
        tooltip.style.left = (e.clientX + 14) + 'px';
        tooltip.style.top  = (e.clientY - 8) + 'px';
      });
      el.addEventListener('mousemove', e => {
        tooltip.style.left = (e.clientX + 14) + 'px';
        tooltip.style.top  = (e.clientY - 8) + 'px';
      });
      el.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
    });
  }

  // ── CSS injection ─────────────────────────────────────────────────────────
  function injectCSS() {

    s.id = 'nx-dash-css';

  // ── Event delegation ──────────────────────────────────────────────────────
  function setupEvents() {
    document.addEventListener('click', e => {
      const el = e.target.closest('[data-action]');
      if (!el) return;
      const root = document.getElementById('nx-dash-root');
      if (!root || !root.contains(el)) return;
      const action = el.getAttribute('data-action');
      if (action === 'goto-tx') { goToInvestmentsTx(); return; }
      if (action === 'set-period') {
        state.period = el.getAttribute('data-period');
        renderPage();
        return;
      }
      if (action === 'toggle-alloc-view') {
        state.allocationView = state.allocationView === 'class' ? 'asset' : 'class';
        renderPage();
        return;
      }
      if (action === 'export') {
        // Basic CSV export
        const data = calcPortfolio();
        const rows = [['Asset','Class','Ticker','Position (R$)','Avg Cost','Qty','P/L (R$)','Allocation %']];
        data.assets.forEach(a => {
          rows.push([a.name, a.assetClass, a.ticker||'', a.position.toFixed(2), a.avgPrice.toFixed(2), a.qtyNet, a.pl.toFixed(2), a.allocation.toFixed(2)]);
        });
        const csv = rows.map(r => r.map(v => '"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
        const blob = new Blob([csv], { type:'text/csv' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href = url; a.download = 'portfolio-export.csv'; a.click();
        URL.revokeObjectURL(url);
        return;
      }
    });
  }

  // ── Nav detection & mount/unmount ─────────────────────────────────────────
  function getActiveNavLabel() {
    const btn = document.querySelector('.sidebar button.nav-item.active');
    if (!btn) return '';
    let lbl = '';
    btn.childNodes.forEach(n => { if (n.nodeType === 3) lbl += n.textContent.trim(); });
    return lbl;
  }
  function isInvestmentsDashboard() {
    const lbl = getActiveNavLabel();
    return /investment/i.test(lbl) && !/trans/i.test(lbl);
  }

  let _mounted = false, _container = null;

  function mount() {
    if (_mounted) return;
    injectCSS();
    const main = document.querySelector('.main');
    if (!main) return;
    Array.from(main.children).forEach(el => { el.dataset.nxDashHidden = '1'; el.style.display = 'none'; });
    _container = document.createElement('div');
    _container.id = 'nx-dash-root';
    main.appendChild(_container);
    _mounted = true;
    // Carrega dados frescos do Gist antes do primeiro render
    loadFromGist().finally(() => { if (_mounted) renderPage(); });
  }

  function unmount() {
    if (!_mounted) return;
    if (_container) { _container.remove(); _container = null; }

    if (now === _lastDash) return;
    _lastDash = now;
    now ? mount() : unmount();
