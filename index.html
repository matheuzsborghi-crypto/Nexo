    const months = Math.floor(days / 30);
    if (months < 12) return months + (months === 1 ? ' month ago' : ' months ago');
    const years = Math.floor(months / 12);
    return years + (years === 1 ? ' year ago' : ' years ago');
  }
  function txRelativeDate(str) {
    if (!str) return '';
    const d = new Date(str + 'T00:00:00');
    const now = Date.now();
    const diff = now - d.getTime();
    const days = Math.floor(diff / 86400000);
    if (days === 0) return 'today';
    if (days === 1) return 'yesterday';
    return days + ' days ago';
  }
  function generateId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }
  function monthLabel(dateStr) {
    if (!dateStr) return 'Unknown';
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
  }
  function monthKey(dateStr) {
    if (!dateStr) return '0000-00';
    return dateStr.slice(0, 7);
  }
  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── 3. DATA LAYER ────────────────────────────────────────────────────────
  const ASSETS_KEY = 'nexo_investment_assets';
  const TXS_KEY = 'nexo_investment_transactions';
  const VIEW_KEY = 'nexo:investments:txView';

  function getAssets() {
    try { return JSON.parse(localStorage.getItem(ASSETS_KEY) || '[]'); } catch { return []; }
  }
  function getTxs() {
    try { return JSON.parse(localStorage.getItem(TXS_KEY) || '[]'); } catch { return []; }
  }

  // ── Gist sync helpers ──────────────────────────────────────────────────────
  // O Gist usa o formato: { meta:{...}, data:{ ..., investmentAssets:[...], investmentTransactions:[...] } }
  // O interceptor fetch() já cuida da autenticação — basta chamar /api/sync/data.

  async function loadFromGist() {
    try {
      const resp = await fetch('/api/sync/data');
      if (!resp.ok) return;
      const json = await resp.json();
      const d = json && json.payload && json.payload.data;
      if (!d) return;
      if (Array.isArray(d.investmentAssets))
        localStorage.setItem(ASSETS_KEY, JSON.stringify(d.investmentAssets));
      if (Array.isArray(d.investmentTransactions))
        localStorage.setItem(TXS_KEY, JSON.stringify(d.investmentTransactions));
    } catch (e) {
      console.warn('[Nexo IT] loadFromGist failed:', e);
    }
  }

  async function syncToGist(assets, txs) {
    try {
      const resp = await fetch('/api/sync/data');
      if (!resp.ok) return;
      const json = await resp.json();
      if (!json || !json.payload) return;
      const payload = json.payload;
      if (!payload.data) payload.data = {};
      payload.data.investmentAssets = assets;
      payload.data.investmentTransactions = txs;
      if (!payload.meta) payload.meta = {};
      payload.meta.updatedAt = new Date().toISOString();
      await fetch('/api/sync/data', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
    } catch (e) {
      console.warn('[Nexo IT] syncToGist failed:', e);
    }
  }

  function saveAssets(arr) {
    localStorage.setItem(ASSETS_KEY, JSON.stringify(arr));
    syncToGist(arr, getTxs());
  }
  function saveTxs(arr) {
    localStorage.setItem(TXS_KEY, JSON.stringify(arr));
    syncToGist(getAssets(), arr);
  }
  function saveAsset(asset) {
    const arr = getAssets();
    const idx = arr.findIndex(a => a.id === asset.id);
    if (idx >= 0) arr[idx] = asset; else arr.push(asset);
    saveAssets(arr);
  }

  // ── 4. CALCULATIONS ──────────────────────────────────────────────────────
  const FIXED_INCOME = new Set(['CDB', 'LCI', 'LCA', 'Fund']);

  function isFixedIncome(assetClass) { return FIXED_INCOME.has(assetClass); }

  function txTotal(tx, assetClass) {
    if (tx.type === 'buy' || tx.type === 'sell') {
      if (isFixedIncome(assetClass)) return parseFloat(tx.amount) || 0;
      return (parseFloat(tx.amount) || 0) * (parseFloat(tx.quantity) || 0);
    }
    return parseFloat(tx.amount) || 0;
  }

  function calcAvgPrice(txs, assetClass) {
    const buys = txs.filter(t => t.type === 'buy');
    if (!buys.length) return 0;
    if (isFixedIncome(assetClass)) {
      const totalAmt = buys.reduce((s, t) => s + (parseFloat(t.amount) || 0), 0);
      const totalQty = buys.reduce((s, t) => s + (parseFloat(t.quantity) || 1), 0);
      return totalQty ? totalAmt / totalQty : 0;
    } else {
      const totalCost = buys.reduce((s, t) => s + (parseFloat(t.amount) || 0) * (parseFloat(t.quantity) || 0), 0);
      const totalQty = buys.reduce((s, t) => s + (parseFloat(t.quantity) || 0), 0);
      return totalQty ? totalCost / totalQty : 0;
    }
  }

  function calcQty(txs) {
    return txs.filter(t => t.type === 'buy' || t.type === 'sell').reduce((s, t) => {
      const q = parseFloat(t.quantity) || 0;
      return t.type === 'buy' ? s + q : s - q;
    }, 0);
  }

  function calcTotalCost(txs, assetClass) {
    const buys = txs.filter(t => t.type === 'buy');
    if (isFixedIncome(assetClass)) {
      return buys.reduce((s, t) => s + (parseFloat(t.amount) || 0), 0);
    } else {
      return buys.reduce((s, t) => s + (parseFloat(t.amount) || 0) * (parseFloat(t.quantity) || 0), 0);
    }
  }

  // Para fundos/renda fixa: capital líquido investido = Σ(buys) − Σ(sells)
  function calcNetInvested(txs) {
    const totalBuys  = txs.filter(t => t.type === 'buy' ).reduce((s, t) => s + (parseFloat(t.amount) || 0), 0);
    const totalSells = txs.filter(t => t.type === 'sell').reduce((s, t) => s + (parseFloat(t.amount) || 0), 0);
    return totalBuys - totalSells;
  }

  function calcPosition(asset, qty) {
    const price = parseFloat(asset.manualUnitPrice) || 0;
    if (isFixedIncome(asset.assetClass)) return price;
    return price * qty;
  }

  function calcPL(asset, avgPriceOrNet, qty) {
    const price = parseFloat(asset.manualUnitPrice) || 0;
    if (isFixedIncome(asset.assetClass)) {
      // avgPriceOrNet é netInvested para renda fixa/fundos
      return price - avgPriceOrNet;
    } else {
      return (price - avgPriceOrNet) * qty;
    }
  }

  function calcPortfolioTotal(assets) {
    return assets.reduce((s, asset) => {
      const txs = getTxs().filter(t => t.assetId === asset.id);
      const qty = calcQty(txs);
      return s + calcPosition(asset, qty);
    }, 0);
  }

  // ── 5. STATE ─────────────────────────────────────────────────────────────
  let state = {
    from: '', to: '', assetId: '', search: '', typeFilter: 'all',
    view: localStorage.getItem(VIEW_KEY) || 'table',
    showAssets: true,
    confirmDelete: null,   // { txId }
    modal: null            // { type: 'newAsset'|'addTx'|'editTx', data: {} }
  };

  // dirty / justSaved per asset id
  const editState = {}; // { [assetId]: { raw: string, dirty: bool, justSaved: bool } }

  // ── 6. BADGE / TYPE HELPERS ──────────────────────────────────────────────
  function badgeInfo(tx, assetClass) {
    if (tx.type === 'buy') return { cls: 'nx-badge-buy', dot: 'var(--buy)', label: 'Buy' };
    if (tx.type === 'sell') return { cls: 'nx-badge-sell', dot: 'var(--sell)', label: 'Sell' };
    if (tx.type === 'adjustment') return { cls: 'nx-badge-adj', dot: 'var(--adj)', label: 'Adj' };
    if (tx.type === 'income') {
      if (assetClass === 'Fund') return { cls: 'nx-badge-div', dot: 'var(--div)', label: 'Dividend' };
      return { cls: 'nx-badge-coup', dot: 'var(--coup)', label: 'Coupon' };
    }
    return { cls: 'nx-badge-adj', dot: 'var(--adj)', label: tx.type };
  }

  function totalClass(type) {
    if (type === 'buy') return 'nx-total-buy';
    if (type === 'sell') return 'nx-total-sell';
    if (type === 'income') return 'nx-total-income';
    return 'nx-total-adj';
  }

  function totalSign(type) {
    if (type === 'buy') return '−';
    if (type === 'sell') return '+';
    if (type === 'income') return '+';
    return '±';
  }

  // ── 7. RENDER ─────────────────────────────────────────────────────────────
  let _container = null;

  function renderPage() {
    if (!_container) return;
    const assets = getAssets();
    const allTxs = getTxs();
    const portfolioTotal = calcPortfolioTotal(assets);
    _container.innerHTML = renderHeader(assets, portfolioTotal) +
      renderFilters(assets) +
      renderAssetsSection(assets, allTxs, portfolioTotal) +
      renderTransactionsSection(assets, allTxs) +
      renderModal(assets) +
      renderConfirmModal();
    attachEventListeners();
  }

  function renderHeader(assets, portfolioTotal) {
    return `
      <div class="nx-page-header">
        <div class="nx-page-header-left">
          <h1>Investments Transactions</h1>
          <p>Track your portfolio assets and transaction history</p>
        </div>
        <div class="nx-header-btns">
          <button class="nx-btn nx-btn-outline" data-action="open-new-asset">+ New asset</button>
          <button class="nx-btn nx-btn-primary" data-action="open-add-tx">+ Add transaction</button>
        </div>
      </div>`;
  }

  function renderFilters(assets) {
    const s = state;
    const chips = [
      { key: 'all', label: 'All types', dot: '#aaa' },
      { key: 'buy', label: 'Buy', dot: 'var(--buy)' },
      { key: 'sell', label: 'Sell', dot: 'var(--sell)' },
      { key: 'income-Fund', label: 'Dividend', dot: 'var(--div)' },
      { key: 'income', label: 'Coupon', dot: 'var(--coup)' },
      { key: 'adjustment', label: 'Adjustment', dot: 'var(--adj)' },
    ];
    const assetOptions = assets.map(a => `<option value="${escHtml(a.id)}" ${s.assetId === a.id ? 'selected' : ''}>${escHtml(a.name)}${a.ticker ? ' (' + escHtml(a.ticker) + ')' : ''}</option>`).join('');
    return `
      <div class="nx-filter-card">
        <div class="nx-filter-grid">
          <div class="nx-filter-field">
            <label>From date</label>
            <input type="date" data-filter="from" value="${escHtml(s.from)}" />
          </div>
          <div class="nx-filter-field">
            <label>To date</label>
            <input type="date" data-filter="to" value="${escHtml(s.to)}" />
          </div>
          <div class="nx-filter-field">
            <label>Asset</label>
            <select data-filter="assetId">
              <option value="">All assets</option>
              ${assetOptions}
            </select>
          </div>
          <div class="nx-filter-field">
            <label>Search</label>
            <input type="text" data-filter="search" value="${escHtml(s.search)}" placeholder="Ticker or note…" />
          </div>
        </div>
        <div class="nx-chips">
          ${chips.map(c => `<span class="nx-chip ${s.typeFilter === c.key ? 'nx-chip-active' : ''}" data-action="type-filter" data-val="${escHtml(c.key)}"><span class="nx-chip-dot" style="background:${c.dot}"></span>${escHtml(c.label)}</span>`).join('')}
          <button class="nx-clear-btn" data-action="clear-filters">Clear all</button>
        </div>
      </div>`;
  }

  function renderAssetsSection(assets, allTxs, portfolioTotal) {
    const totalFmt = 'R$ ' + fmtBR(portfolioTotal);
    const pill = `${assets.length} asset${assets.length !== 1 ? 's' : ''} · ${totalFmt}`;
    const arrow = state.showAssets ? '▲' : '▼';
    let body = '';
    if (state.showAssets) {
      if (!assets.length) {
        body = `<div class="nx-empty"><div class="nx-empty-icon">📊</div><h3>No assets yet</h3><p>Add your first investment asset to start tracking.</p><button class="nx-btn nx-btn-primary" data-action="open-new-asset">+ New asset</button></div>`;
      } else {
        body = `<div class="nx-asset-grid">${assets.map(a => renderAssetCard(a, allTxs.filter(t => t.assetId === a.id), portfolioTotal)).join('')}</div>`;
      }
    }
    return `
      <div class="nx-section">
        <div class="nx-section-header">
          <h2 class="nx-section-title">Assets</h2>
          <span class="nx-pill">${escHtml(pill)}</span>
          <button class="nx-collapse-btn" data-action="toggle-assets">${arrow}</button>
        </div>
        ${body}
      </div>`;
  }

  function renderAssetCard(asset, txs, portfolioTotal) {
    const fi = isFixedIncome(asset.assetClass);
    const qty = calcQty(txs);
    const txCount = txs.filter(t => t.type === 'buy' || t.type === 'sell').length;

    // Para fundos/renda fixa: usa capital líquido investido
    // Para ETFs: usa preço médio ponderado por cota
    const netInvested = fi ? calcNetInvested(txs) : 0;
    const avgPrice    = fi ? 0 : calcAvgPrice(txs, asset.assetClass);

    // Renda fixa com cupons: inclui os rendimentos recebidos no Total P/L
    const totalIncome = fi
      ? txs.filter(t => t.type === 'income').reduce((s, t) => s + (parseFloat(t.amount) || 0), 0)
      : 0;

    const position  = calcPosition(asset, qty);

    // Para fi: Total P/L = (valor atual − capital líquido) + rendimentos recebidos
    // Para ETF: Unrealized P/L = (preço atual − preço médio) × qtd
    const unrealizedPL = fi
      ? calcPL(asset, netInvested, qty)
      : calcPL(asset, avgPrice, qty);
    const pl = fi ? unrealizedPL + totalIncome : unrealizedPL;

    const plBase    = fi ? netInvested : calcTotalCost(txs, asset.assetClass);
    const plPct     = plBase ? (pl / plBase * 100) : 0;
    const allocation = portfolioTotal ? (position / portfolioTotal * 100) : 0;
    const totalCost = fi ? netInvested : calcTotalCost(txs, asset.assetClass);

    // Label: "Total P/L" para fi (inclui cupons), "Unrealized P/L" para ETF
    const plLabel = fi ? 'Total P/L' : 'Unrealized P/L';
    // Subtítulo extra para fi: mostra quanto veio de rendimentos
    const plSub = (fi && totalIncome > 0)
      ? `incl. R$ ${fmtBR(totalIncome)} income`
      : '';

    const plCls  = pl >= 0 ? 'nx-stat-buy' : 'nx-stat-sell';
    const plSign = pl >= 0 ? '+' : '';

    // Editable state
    const es = editState[asset.id] || (editState[asset.id] = { raw: fmtBR(asset.manualUnitPrice || 0), dirty: false, justSaved: false });
    let subText = '';
    if (es.dirty) {
      subText = `<span class="nx-stat-accent">Press Enter or ✓ to save</span>`;
    } else if (es.justSaved) {
      subText = `<span class="nx-stat-buy">✓ Saved · recalculated</span>`;
    } else {
      const upd = asset.priceUpdatedAt ? 'Last updated · ' + relativeDate(asset.priceUpdatedAt) : 'Not yet updated';
      subText = `<span>${escHtml(upd)}</span>`;
    }

    const editLabel = fi ? 'Current total value' : 'Current unit price';
    const footerLeft = fi
      ? `Net invested · R$ ${fmtBR(netInvested)}`
      : `Cost basis · R$ ${fmtBR(totalCost)}`;
    const footerRight = fi
      ? 'Editable value = total net position'
      : 'Editable value = unit price per share';

    // Stat 3: "Capital investido" (fi) ou "Avg unit price" (ETF)
    const avgLabel = fi ? 'Capital invested' : 'Avg unit price';
    const avgValue = fi ? fmtBR(netInvested) : fmtBR(avgPrice);
    const avgSub = fi
      ? `${txCount} transaction${txCount !== 1 ? 's' : ''}`
      : `${fmtQty(qty)} shares · ${txCount} tx`;

    const couponBtn = fi ? `<button class="nx-btn nx-btn-outline nx-btn-sm" data-action="open-coupon" data-asset-id="${escHtml(asset.id)}">+ Coupon</button>` : '';

    return `
      <div class="nx-asset-card" data-asset-id="${escHtml(asset.id)}">
        <div class="nx-asset-card-header">
          <div>
            <div class="nx-asset-card-name">${escHtml(asset.name)}<span class="nx-asset-class-badge">${escHtml(asset.assetClass || '')}</span></div>
            <div class="nx-asset-card-meta">${asset.ticker ? escHtml(asset.ticker) : ''}${asset.issuer ? ' · ' + escHtml(asset.issuer) : ''}</div>
          </div>
          <div class="nx-asset-actions">
            ${couponBtn}
          </div>
        </div>
        <div class="nx-stats-grid">
          <div class="nx-stat">
            <div class="nx-stat-label">${escHtml(editLabel)}</div>
            <div class="nx-editable-wrap">
              <div class="nx-editable-input-row">
                <span class="nx-editable-prefix">R$</span>
                <input class="nx-editable-input" type="text" data-action="price-input" data-asset-id="${escHtml(asset.id)}" value="${escHtml(es.raw)}" inputmode="decimal" />
                <button class="nx-editable-confirm" data-action="price-save" data-asset-id="${escHtml(asset.id)}" ${es.dirty ? '' : 'disabled'}>✓</button>
              </div>
              <div class="nx-editable-sub">${subText}</div>
            </div>
          </div>
          <div class="nx-stat">
            <div class="nx-stat-label">Current position</div>
            <div class="nx-stat-value">R$ ${fmtBR(position)}<span class="nx-alloc-chip">${fmtBR(allocation, 1)}%</span></div>
            <div class="nx-stat-sub">${fi ? 'Net position' : fmtQty(qty) + ' shares'}</div>
          </div>
          <div class="nx-stat">
            <div class="nx-stat-label">${avgLabel}</div>
            <div class="nx-stat-value">R$ ${avgValue}</div>
            <div class="nx-stat-sub">${escHtml(avgSub)}</div>
          </div>
          <div class="nx-stat">
            <div class="nx-stat-label">${escHtml(plLabel)}</div>
            <div class="nx-stat-value ${plCls}">${plSign}R$ ${fmtBR(Math.abs(pl))}</div>
            <div class="nx-stat-sub ${plCls}">${plSign}${fmtBR(Math.abs(plPct), 1)}%${plSub ? '<br><span style="font-size:10px;opacity:.8;">' + escHtml(plSub) + '</span>' : ''}</div>
          </div>
        </div>
        <div class="nx-asset-footer">
          <span class="nx-asset-footer-left">${escHtml(footerLeft)}</span>
          <span class="nx-asset-footer-right">${escHtml(footerRight)}</span>
        </div>
      </div>`;
  }

  function filterTxs(allTxs, assets) {
    const s = state;
    const assetMap = {};
    assets.forEach(a => { assetMap[a.id] = a; });
    return allTxs.filter(tx => {
      if (s.from && tx.date < s.from) return false;
      if (s.to && tx.date > s.to) return false;
      if (s.assetId && tx.assetId !== s.assetId) return false;
      if (s.search) {
        const q = s.search.toLowerCase();
        const a = assetMap[tx.assetId];
        const ticker = (a && a.ticker || '').toLowerCase();
        const note = (tx.notes || '').toLowerCase();
        if (!ticker.includes(q) && !note.includes(q)) return false;
      }
      if (s.typeFilter !== 'all') {
        if (s.typeFilter === 'income-Fund') {
          const a = assetMap[tx.assetId];
          if (tx.type !== 'income' || !a || a.assetClass !== 'Fund') return false;
        } else if (s.typeFilter === 'income') {
          const a = assetMap[tx.assetId];
          if (tx.type !== 'income' || (a && a.assetClass === 'Fund')) return false;
        } else {
          if (tx.type !== s.typeFilter) return false;
        }
      }
      return true;
    });
  }

  function renderTransactionsSection(assets, allTxs) {
    const filtered = filterTxs(allTxs, assets);
    const count = filtered.length;
    const isCards = state.view === 'cards';
    return `
      <div class="nx-section">
        <div class="nx-section-header">
          <h2 class="nx-section-title">Transactions</h2>
          <span class="nx-pill">${count} transaction${count !== 1 ? 's' : ''}</span>
          <div class="nx-section-view-toggle">
            <button class="nx-vt-btn ${!isCards ? 'active' : ''}" data-action="set-view" data-val="table">Table</button>
            <button class="nx-vt-btn ${isCards ? 'active' : ''}" data-action="set-view" data-val="cards">Cards</button>
          </div>
        </div>
        ${isCards ? renderCardsView(filtered, assets) : renderTableView(filtered, assets)}
      </div>`;
  }

  function renderTableView(filtered, assets) {
    if (!filtered.length) {
      return `<div class="nx-table-wrap"><div class="nx-table-empty">No transactions match these filters · <a data-action="clear-filters">Clear filters</a></div></div>`;
    }
    const assetMap = {};
    assets.forEach(a => { assetMap[a.id] = a; });

    // group by month descending
    const groups = {};
    filtered.forEach(tx => {
      const k = monthKey(tx.date);
      if (!groups[k]) groups[k] = [];
      groups[k].push(tx);
    });
    const sortedKeys = Object.keys(groups).sort((a, b) => b.localeCompare(a));

    let html = '<div class="nx-table-wrap">';
    html += '<table class="nx-table"><thead><tr>' +
      '<th>Type</th><th>Asset</th><th>Date</th><th>Qty</th><th>Unit price</th><th>Total</th><th>Note</th><th></th>' +
      '</tr></thead><tbody>';

    sortedKeys.forEach(key => {
      const txs = groups[key];
      const sorted = [...txs].sort((a, b) => b.date.localeCompare(a.date));
      // month net
      const net = sorted.reduce((s, tx) => {
        const a = assetMap[tx.assetId];
        const t = txTotal(tx, a ? a.assetClass : 'ETF');
        if (tx.type === 'buy') return s - t;
        if (tx.type === 'sell' || tx.type === 'income') return s + t;
        return s;
      }, 0);
      const netSign = net >= 0 ? '+' : '';
      const lbl = monthLabel(key + '-01');
      html += `<tr><td colspan="8" style="padding:0;"><div class="nx-month-header"><span class="nx-month-label">${escHtml(lbl)}</span><span class="nx-month-meta">Net: ${netSign}R$ ${fmtBR(Math.abs(net))} · ${sorted.length} transaction${sorted.length !== 1 ? 's' : ''}</span></div></td></tr>`;

      sorted.forEach(tx => {
        const asset = assetMap[tx.assetId];
        const ac = asset ? asset.assetClass : 'ETF';
        const badge = badgeInfo(tx, ac);
        const total = txTotal(tx, ac);
        const totalCls = totalClass(tx.type);
        const sign = totalSign(tx.type);
        const unitPrice = (tx.type === 'buy' || tx.type === 'sell') ? 'R$ ' + fmtBR(parseFloat(tx.amount) || 0) : '—';
        const qty = (tx.type === 'buy' || tx.type === 'sell') ? fmtQty(parseFloat(tx.quantity) || 0) : '—';
        html += `<tr>
          <td><span class="nx-type-badge ${badge.cls}"><span class="nx-chip-dot" style="background:${badge.dot}"></span>${escHtml(badge.label)}</span></td>
          <td><div class="nx-asset-name-cell">${escHtml(asset ? asset.name : tx.assetId)}<div class="nx-asset-ticker-meta">${asset && asset.ticker ? escHtml(asset.ticker) + ' · ' : ''}${escHtml(ac)}</div></div></td>
          <td><div class="nx-date-main">${fmtDate(tx.date)}</div><div class="nx-date-sub">${txRelativeDate(tx.date)}</div></td>
          <td>${qty}</td>
          <td>${unitPrice}</td>
          <td><span class="${totalCls}">${sign}R$ ${fmtBR(total)}</span></td>
          <td><span class="nx-note-cell" title="${escHtml(tx.notes || '')}">${escHtml(tx.notes || '')}</span></td>
          <td><div class="nx-table-actions">
            <button class="nx-tbl-icon-btn" data-action="edit-tx" data-tx-id="${escHtml(tx.id)}" title="Edit">✏️</button>
            <button class="nx-tbl-icon-btn nx-danger" data-action="delete-tx" data-tx-id="${escHtml(tx.id)}" title="Delete">🗑️</button>
          </div></td>
        </tr>`;
      });
    });

    html += '</tbody></table></div>';
    return html;
  }

  function renderCardsView(filtered, assets) {
    if (!filtered.length) {
      return `<div class="nx-table-wrap"><div class="nx-table-empty">No transactions match these filters · <a data-action="clear-filters">Clear filters</a></div></div>`;
    }
    const assetMap = {};
    assets.forEach(a => { assetMap[a.id] = a; });

    const groups = {};
    filtered.forEach(tx => {
      const k = monthKey(tx.date);
      if (!groups[k]) groups[k] = [];
      groups[k].push(tx);
    });
    const sortedKeys = Object.keys(groups).sort((a, b) => b.localeCompare(a));

    let html = '';
    sortedKeys.forEach(key => {
      const txs = [...groups[key]].sort((a, b) => b.date.localeCompare(a.date));
      const lbl = monthLabel(key + '-01');
      html += `<div class="nx-month-section">
        <div class="nx-month-header" style="border-radius:10px;margin-bottom:10px;"><span class="nx-month-label">${escHtml(lbl)}</span><span class="nx-month-meta">${txs.length} transaction${txs.length !== 1 ? 's' : ''}</span></div>
        <div class="nx-cards-grid">`;
      txs.forEach(tx => {
        const asset = assetMap[tx.assetId];
        const ac = asset ? asset.assetClass : 'ETF';
        const badge = badgeInfo(tx, ac);
        const total = txTotal(tx, ac);
        const sign = totalSign(tx.type);
        html += `<div class="nx-tx-card">
          <div class="nx-tx-card-header">
            <span class="nx-type-badge ${badge.cls}"><span class="nx-chip-dot" style="background:${badge.dot}"></span>${escHtml(badge.label)}</span>
            <div style="display:flex;gap:4px;">
              <button class="nx-tbl-icon-btn" data-action="edit-tx" data-tx-id="${escHtml(tx.id)}" title="Edit">✏️</button>
              <button class="nx-tbl-icon-btn nx-danger" data-action="delete-tx" data-tx-id="${escHtml(tx.id)}" title="Delete">🗑️</button>
            </div>
          </div>
          <div class="nx-tx-card-field"><div class="nx-tx-card-field-label">Asset</div><div class="nx-tx-card-field-value">${escHtml(asset ? asset.name : tx.assetId)}</div></div>
          <div class="nx-tx-card-field"><div class="nx-tx-card-field-label">Date</div><div class="nx-tx-card-field-value">${fmtDate(tx.date)} <span style="color:var(--text-secondary,#6b6b6b);font-size:11px;">${txRelativeDate(tx.date)}</span></div></div>
          ${(tx.type === 'buy' || tx.type === 'sell') ? `<div class="nx-tx-card-field"><div class="nx-tx-card-field-label">Qty</div><div class="nx-tx-card-field-value">${fmtQty(parseFloat(tx.quantity)||0)}</div></div>` : ''}
          <div class="nx-tx-card-field"><div class="nx-tx-card-field-label">Total</div><div class="nx-tx-card-field-value" style="font-family:'Fraunces',Georgia,serif;font-weight:600;">${sign}R$ ${fmtBR(total)}</div></div>
          ${tx.notes ? `<div class="nx-tx-card-field"><div class="nx-tx-card-field-label">Note</div><div class="nx-tx-card-field-value" style="font-style:italic;color:var(--text-secondary,#6b6b6b);">${escHtml(tx.notes)}</div></div>` : ''}
        </div>`;
      });
      html += '</div></div>';
    });
    return html;
  }

  // ── 8. MODALS ─────────────────────────────────────────────────────────────
  function renderModal(assets) {
    const m = state.modal;
    if (!m) return '';
    if (m.type === 'newAsset') return renderNewAssetModal();
    if (m.type === 'addTx' || m.type === 'editTx' || m.type === 'coupon') return renderTxModal(assets, m);
    return '';
  }

  function renderNewAssetModal() {
    const d = state.modal.data || {};
    return `
      <div class="nx-modal-overlay" data-action="modal-overlay-close">
        <div class="nx-modal">
          <div class="nx-modal-title">New Asset</div>
          <div class="nx-modal-field"><label>Name *</label><input type="text" id="nm-name" value="${escHtml(d.name||'')}" placeholder="e.g. iShares S&P 500" /></div>
          <div class="nx-modal-field"><label>Ticker</label><input type="text" id="nm-ticker" value="${escHtml(d.ticker||'')}" placeholder="e.g. IVVB11" /></div>
          <div class="nx-modal-field"><label>Asset class *</label>
            <select id="nm-class">
              ${['ETF','Fund','CDB','LCI','LCA','Cash'].map(c => `<option value="${c}" ${(d.assetClass||'ETF')===c?'selected':''}>${c}</option>`).join('')}
            </select>
          </div>
          <div id="nm-fi-fields" style="${isFixedIncome(d.assetClass||'ETF')?'':'display:none'}">
            <div class="nx-modal-field"><label>Issuer</label><input type="text" id="nm-issuer" value="${escHtml(d.issuer||'')}" placeholder="e.g. Banco XYZ" /></div>
            <div class="nx-modal-field"><label>Maturity date</label><input type="date" id="nm-maturity" value="${escHtml(d.maturityDate||'')}" /></div>
          </div>
          <div id="nm-region-fields" style="${(['ETF','Fund'].indexOf(d.assetClass||'ETF')>=0)?'':'display:none'}">
            <div class="nx-modal-field"><label>Region</label>
              <select id="nm-region">
                <option value="BR" ${(d.region||'BR')==='BR'?'selected':''}>Domestic (BR)</option>
                <option value="INTL" ${(d.region||'BR')==='INTL'?'selected':''}>International</option>
                <option value="CRYPTO" ${(d.region||'BR')==='CRYPTO'?'selected':''}>Crypto</option>
              </select>
            </div>
          </div>
          <div class="nx-modal-field"><label>Notes</label><textarea id="nm-notes" rows="2" placeholder="Optional…">${escHtml(d.notes||'')}</textarea></div>
          <div class="nx-modal-footer">
            <button class="nx-btn nx-btn-ghost" data-action="modal-close">Cancel</button>
            <button class="nx-btn nx-btn-primary" data-action="save-new-asset">Save asset</button>
          </div>
        </div>
      </div>`;
  }

  function renderTxModal(assets, m) {
    const d = m.data || {};
    const isEdit = m.type === 'editTx';
    const title = isEdit ? 'Edit transaction' : 'Add transaction';
    const ac = assets.find(a => a.id === (d.assetId||''));
    const fi = ac ? isFixedIncome(ac.assetClass) : false;
    return `
      <div class="nx-modal-overlay" data-action="modal-overlay-close">
        <div class="nx-modal">
          <div class="nx-modal-title">${escHtml(title)}</div>
          <div class="nx-modal-field"><label>Asset *</label>
            <select id="tm-asset" ${m.type === 'coupon' ? 'disabled' : ''}>
              <option value="">Select asset…</option>
              ${assets.map(a => `<option value="${escHtml(a.id)}" ${d.assetId===a.id?'selected':''}>${escHtml(a.name)}${a.ticker?' ('+a.ticker+')':''}</option>`).join('')}
            </select>
          </div>
          <div class="nx-modal-field"><label>Type *</label>
            <select id="tm-type" ${m.type === 'coupon' ? 'disabled' : ''}>
              ${['buy','sell','income','adjustment'].map(t => `<option value="${t}" ${(d.type||'buy')===t?'selected':''}>${t}</option>`).join('')}
            </select>
          </div>
          <div class="nx-modal-field"><label>Date *</label><input type="date" id="tm-date" value="${escHtml(d.date||new Date().toISOString().slice(0,10))}" /></div>
          <div id="tm-qty-wrap" class="nx-modal-field" style="${fi?'display:none':''}"><label>Quantity</label><input type="number" id="tm-qty" value="${escHtml(d.quantity||'')}" placeholder="0" step="any" min="0" /></div>
          <div class="nx-modal-field">
            <label id="tm-amount-label">${fi ? 'Total amount (R$)' : 'Unit price (R$)'} *</label>
            <div style="display:flex;align-items:center;gap:6px;border:1.5px solid var(--border,#e8e8e8);border-radius:8px;padding:0 10px;background:var(--input-bg,#fafafa);">
              <span style="font-size:13px;color:var(--text-secondary,#6b7280);flex-shrink:0;">R$</span>
              <input type="text" id="tm-amount" class="nx-modal-money-input"
                inputmode="decimal" autocomplete="off"
                value="${d.amount ? parseBR(d.amount).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}) : '0,00'}"
                placeholder="0,00"
                style="border:none;background:transparent;outline:none;font-size:14px;width:100%;padding:10px 0;color:var(--text,#1a1a1a);" />
            </div>
          </div>
          <div class="nx-modal-field"><label>Notes</label><textarea id="tm-notes" rows="2" placeholder="Optional…">${escHtml(d.notes||'')}</textarea></div>
          <div id="tm-save-error" style="display:none;color:var(--sell,#C25450);font-size:13px;margin-bottom:8px;"></div>
          <div class="nx-modal-footer">
            <button class="nx-btn nx-btn-ghost" data-action="modal-close">Cancel</button>
            <button class="nx-btn nx-btn-primary" data-action="save-tx" ${isEdit ? `data-tx-id="${escHtml(d.id||'')}"` : ''}>Save</button>
          </div>
        </div>
      </div>`;
  }

  function renderConfirmModal() {
    if (!state.confirmDelete) return '';
    return `
      <div class="nx-modal-overlay" data-action="modal-overlay-close">
        <div class="nx-confirm-modal">
          <p>Delete this transaction? This action cannot be undone.</p>
          <div class="nx-modal-footer">
            <button class="nx-btn nx-btn-ghost nx-btn-sm" data-action="cancel-delete">Cancel</button>
            <button class="nx-btn nx-btn-danger nx-btn-sm" data-action="confirm-delete" data-tx-id="${escHtml(state.confirmDelete.txId)}">Delete</button>
          </div>
        </div>
      </div>`;
  }

  // ── 9. EVENT HANDLERS ─────────────────────────────────────────────────────
  function attachEventListeners() {
    if (!_container) return;

    // Delegated click — remove antes de adicionar para evitar acúmulo entre re-renders
    _container.removeEventListener('click', handleClick);
    _container.addEventListener('click', handleClick);

    // Filter inputs (change + input)
    _container.querySelectorAll('[data-filter]').forEach(el => {
      el.addEventListener('change', handleFilterChange);
      el.addEventListener('input', handleFilterChange);
    });

    // Price inputs (keydown for Enter, input for dirty)
    _container.querySelectorAll('.nx-editable-input').forEach(el => {
      el.addEventListener('input', handlePriceInput);
      el.addEventListener('keydown', handlePriceKeydown);
      // Ao focar, seleciona tudo: o primeiro dígito digitado substitui o valor anterior,
      // garantindo que o input calculadora comece do zero.
      el.addEventListener('focus', () => el.select());
    });

    // Asset class change in new asset modal to show/hide fi fields
    const nmClass = _container.querySelector('#nm-class');
    if (nmClass) {
      nmClass.addEventListener('change', () => {
        const fiFields = _container.querySelector('#nm-fi-fields');
        if (fiFields) fiFields.style.display = isFixedIncome(nmClass.value) ? '' : 'none';
        const regionFields = _container.querySelector('#nm-region-fields');
        if (regionFields) regionFields.style.display = (['ETF','Fund'].indexOf(nmClass.value) >= 0) ? '' : 'none';
      });
    }

    // Modal amount input — formato calculadora (igual ao campo de preço dos asset cards)
    const tmAmount = _container.querySelector('#tm-amount');
    if (tmAmount) {
      tmAmount.addEventListener('input', function () {
        const digits = tmAmount.value.replace(/\D/g, '');
        const cents = parseInt(digits || '0', 10);
        const fmt = (cents / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        tmAmount.value = fmt;
        tmAmount.setSelectionRange(fmt.length, fmt.length);
        // Limpa erro se existir
        const errEl = _container.querySelector('#tm-save-error');
        if (errEl) errEl.style.display = 'none';
      });
      tmAmount.addEventListener('focus', function () { tmAmount.select(); });
    }

    // Asset select change in tx modal to show/hide qty
    const tmAsset = _container.querySelector('#tm-asset');
    if (tmAsset) {
      tmAsset.addEventListener('change', () => {
        const assets = getAssets();
        const asset = assets.find(a => a.id === tmAsset.value);
        const fi = asset ? isFixedIncome(asset.assetClass) : false;
        const qtyWrap = _container.querySelector('#tm-qty-wrap');
        if (qtyWrap) qtyWrap.style.display = fi ? 'none' : '';
      });
    }
  }

  function handleClick(e) {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;

    if (action === 'open-new-asset') { state.modal = { type: 'newAsset', data: {} }; renderPage(); return; }
    if (action === 'open-add-tx') { state.modal = { type: 'addTx', data: {} }; renderPage(); return; }
    if (action === 'open-coupon') {
      const assetId = btn.dataset.assetId;
      state.modal = { type: 'coupon', data: { assetId, type: 'income' } };
      renderPage(); return;
    }
    if (action === 'modal-close') { state.modal = null; renderPage(); return; }
    // modal-overlay-close: fecha apenas se o clique foi direto no overlay (não em conteúdo interno)
    if (action === 'modal-overlay-close') { if (e.target === btn) { state.modal = null; renderPage(); } return; }
    if (action === 'toggle-assets') { state.showAssets = !state.showAssets; renderPage(); return; }
    if (action === 'type-filter') { state.typeFilter = btn.dataset.val; renderPage(); return; }
    if (action === 'set-view') {
      state.view = btn.dataset.val;
      localStorage.setItem(VIEW_KEY, state.view);
      renderPage(); return;
    }
    if (action === 'clear-filters') {
      state.from = ''; state.to = ''; state.assetId = ''; state.search = ''; state.typeFilter = 'all';
      renderPage(); return;
    }
    if (action === 'price-save') {
      const assetId = btn.dataset.assetId;
      savePriceForAsset(assetId);
      return;
    }
    if (action === 'save-new-asset') { doSaveNewAsset(); return; }
    if (action === 'save-tx') { doSaveTx(btn.dataset.txId); return; }
    if (action === 'edit-tx') {
      const txId = btn.dataset.txId;
      const tx = getTxs().find(t => t.id === txId);
      if (tx) { state.modal = { type: 'editTx', data: { ...tx } }; renderPage(); }
      return;
    }
    if (action === 'delete-tx') {
      state.confirmDelete = { txId: btn.dataset.txId };
      renderPage(); return;
    }
    if (action === 'cancel-delete') { state.confirmDelete = null; renderPage(); return; }
    if (action === 'confirm-delete') {
      const txId = btn.dataset.txId;
      const txs = getTxs().filter(t => t.id !== txId);
      saveTxs(txs);
      state.confirmDelete = null;
      renderPage(); return;
    }
  }

  function handleFilterChange(e) {
    const el = e.target;
    const key = el.dataset.filter;
    if (key) { state[key] = el.value; renderPage(); }
  }

  function handlePriceInput(e) {
    const el = e.target;
    const assetId = el.dataset.assetId;
    if (!assetId) return;

    // Formato calculadora: extrai só os dígitos, trata como centavos e shifta pra esquerda.
    // Ex.: digitar "1","2","3","4","5" → "0,01" → "0,12" → "1,23" → "12,34" → "123,45"
    const digits = el.value.replace(/\D/g, '');
    const cents = parseInt(digits || '0', 10);
    const formatted = (cents / 100).toLocaleString('pt-BR', {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2,
    });
    // Atualiza o valor exibido e reposiciona o cursor no fim
    el.value = formatted;
    el.setSelectionRange(formatted.length, formatted.length);

    if (!editState[assetId]) editState[assetId] = { raw: formatted, dirty: false, justSaved: false };
    editState[assetId].raw = formatted;
    editState[assetId].dirty = true;
    editState[assetId].justSaved = false;

    const confirmBtn = _container.querySelector(`.nx-editable-confirm[data-asset-id="${assetId}"]`);
    if (confirmBtn) confirmBtn.disabled = false;
    const subEl = el.closest('.nx-editable-wrap') && el.closest('.nx-editable-wrap').querySelector('.nx-editable-sub');
    if (subEl) subEl.innerHTML = `<span class="nx-stat-accent">Press Enter or ✓ to save</span>`;
  }

  function handlePriceKeydown(e) {
    if (e.key === 'Enter') {
      const assetId = e.target.dataset.assetId;
      if (assetId) savePriceForAsset(assetId);
    }
  }

  function savePriceForAsset(assetId) {
    const es = editState[assetId];
    if (!es) return;
    const raw = es.raw;
    const val = parseBR(raw);
    if (isNaN(val) || val < 0) return;
    const assets = getAssets();
    const asset = assets.find(a => a.id === assetId);
    if (!asset) return;
    asset.manualUnitPrice = val;
    asset.priceUpdatedAt = new Date().toISOString();
    saveAsset(asset);
    editState[assetId].dirty = false;
    editState[assetId].justSaved = true;
    editState[assetId].raw = fmtBR(val);
    renderPage();
    // clear justSaved after 2s
    setTimeout(() => {
      if (editState[assetId]) {
        editState[assetId].justSaved = false;
        renderPage();
      }
    }, 2000);
  }

  function doSaveNewAsset() {
    const name = (_container.querySelector('#nm-name') || {}).value || '';
    const ticker = (_container.querySelector('#nm-ticker') || {}).value || '';
    const assetClass = (_container.querySelector('#nm-class') || {}).value || 'ETF';
    const issuer = (_container.querySelector('#nm-issuer') || {}).value || '';
    const maturityDate = (_container.querySelector('#nm-maturity') || {}).value || '';
    const region = (_container.querySelector('#nm-region') || {}).value || 'BR';
    const notes = (_container.querySelector('#nm-notes') || {}).value || '';
    if (!name.trim()) { alert('Name is required.'); return; }
    const asset = { id: generateId(), name: name.trim(), ticker: ticker.trim(), assetClass, region, issuer, maturityDate, notes, manualUnitPrice: 0, priceUpdatedAt: '' };
    saveAsset(asset);
    state.modal = null;
    renderPage();
  }

  function doSaveTx(existingId) {
    const assetId = (_container.querySelector('#tm-asset') || {}).value || '';
    const type = (_container.querySelector('#tm-type') || {}).value || 'buy';
    const date = (_container.querySelector('#tm-date') || {}).value || '';
    const quantity = (_container.querySelector('#tm-qty') || {}).value || '1';
    const amount = (_container.querySelector('#tm-amount') || {}).value || '';
    const notes = (_container.querySelector('#tm-notes') || {}).value || '';
    if (!assetId || !date || !amount) {
      // Mostra erro inline em vez de alert()
      const errEl = _container && _container.querySelector('#tm-save-error');
      if (errEl) { errEl.textContent = 'Asset, date and amount are required.'; errEl.style.display = 'block'; }
      return;
    }
    const parsedAmount = parseBR(amount); // suporta "1.234,56", "1234,56" e "1234.56"
    const txs = getTxs();
    if (existingId) {
      const idx = txs.findIndex(t => t.id === existingId);
      if (idx >= 0) txs[idx] = { ...txs[idx], assetId, type, date, quantity: parseFloat(quantity)||1, amount: parsedAmount, notes };
    } else {
      txs.push({ id: generateId(), assetId, type, date, quantity: parseFloat(quantity)||1, amount: parsedAmount, notes });
    }
    saveTxs(txs);
    state.modal = null;
    renderPage();
  }

  // ── 10. MOUNT / UNMOUNT / DETECT ──────────────────────────────────────────
  let _mounted = false;

  function getActiveNavLabel() {
    const btn = document.querySelector('.sidebar button.nav-item.active');
    if (!btn) return '';
    let lbl = '';
    btn.childNodes.forEach(n => { if (n.nodeType === 3) lbl += n.textContent.trim(); });
    return lbl;
  }

  function isInvestmentTransactions() {
    return /investment.*trans|trans.*invest/i.test(getActiveNavLabel());
  }

  function mount() {
    if (_mounted) return;
    injectCSS();
    const main = document.querySelector('.main');
    if (!main) return;
    Array.from(main.children).forEach(el => { el.dataset.nxHidden = '1'; el.style.display = 'none'; });
    _container = document.createElement('div');
    _container.id = 'nx-it-root';
    main.appendChild(_container);
    _mounted = true;
    // Carrega dados frescos do Gist antes do primeiro render
    loadFromGist().finally(() => { if (_mounted) renderPage(); });
  }

  function unmount() {
    if (!_mounted) return;
    if (_container) { _container.remove(); _container = null; }
    const main = document.querySelector('.main');
    if (main) Array.from(main.children).forEach(el => {
      if (el.dataset.nxHidden) { el.style.display = ''; delete el.dataset.nxHidden; }
    });
    _mounted = false;
  }

  let _lastActive = false;
  new MutationObserver(() => {
    const now = isInvestmentTransactions();
    if (now === _lastActive) return;
    _lastActive = now;
    now ? mount() : unmount();
  }).observe(document.body, { subtree: true, attributes: true, attributeFilter: ['class'] });

  setTimeout(() => {
    _lastActive = isInvestmentTransactions();
    if (_lastActive) mount();
  }, 600);

})();
</script>

  <script>
/* ── Nexo — Nav Patches (icon + order) ──────────────────────────────────── */
(function () {
  'use strict';

  var INVEST_TX_ICON =
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" ' +
    'stroke-linecap="round" stroke-linejoin="round">' +
    '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>' +
    '<polyline points="14 2 14 8 20 8"/>' +
    '<polyline points="8 17 10 14 13 16 16 12"/>' +
    '</svg>';

  function itemLabel(btn) {
    var lbl = '';
    btn.childNodes.forEach(function (n) {
      if (n.nodeType === 3) lbl += n.textContent.trim();
    });
    return lbl.toLowerCase();
  }

  var NOVOS_INV_ICON =
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" ' +
    'stroke-linecap="round" stroke-linejoin="round">' +
    '<circle cx="12" cy="12" r="9"/>' +
    '<line x1="12" y1="7" x2="12" y2="17"/>' +
    '<line x1="7" y1="12" x2="17" y2="12"/>' +
    '</svg>';

  var _iconDone   = false;
  var _orderDone  = false;
  var _navBtnDone = false;

  function injectNovosInvBtn(btns) {
    if (document.querySelector('.sidebar button.nav-item[data-novosinv]')) return true;
    if (!btns.length) return false;
    var template = btns[0];
    var newBtn = template.cloneNode(false);   // shallow clone, no children, no React listeners
    newBtn.className = template.className;     // same class chain (nav-item etc.)
    newBtn.setAttribute('data-novosinv', '1');
    newBtn.classList.remove('active');
    // Build icon + label
    var iconWrap = document.createElement('span');
    iconWrap.innerHTML = NOVOS_INV_ICON;
    newBtn.appendChild(iconWrap.firstChild);
    newBtn.appendChild(document.createTextNode('New investments'));
    // Click handler — set our button active, clear React ones
    newBtn.addEventListener('click', function (e) {
      e.preventDefault();
      e.stopPropagation();
      Array.from(document.querySelectorAll('.sidebar button.nav-item')).forEach(function (b) {
        b.classList.remove('active');
      });

(function () {
  'use strict';

  /* Estilos do card de total */
  var s = document.createElement('style');
  s.textContent =
    '#nx-total{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;' +

    'text-transform:uppercase;letter-spacing:.5px;}' +
    '#nx-total .nx-t-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}' +
    '#nx-total .nx-t-val{font-size:20px;font-weight:700;color:var(--accent,#E07A5F);letter-spacing:-.4px;}' +
    '#nx-total .nx-t-val.positive{color:#22c55e;}' +
    '#nx-total .nx-t-count{font-size:12px;color:var(--text-secondary,#6b7280);}';
  document.head.appendChild(s);

  /* Parseia valor brasileiro: "−R$ 1.234,56" → -1234.56 */
  function parseBRL(text) {
    var neg = /[−\-]/.test(text.trim().charAt(0)) || text.indexOf('−') > -1;
    var num = text.replace(/[^0-9,]/g, '').replace(',', '.');
    var val = parseFloat(num) || 0;
    return neg ? -val : val;
  }

  /* Formata número como BRL */
  function fmtBRL(v) {
    var abs = Math.abs(v).toFixed(2);
    var parts = abs.split('.');
    parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
    return (v < 0 ? '−' : '+') + 'R$ ' + parts[0] + ',' + parts[1];
  }

  var _el = null;
  var _lastKey = '';

  function recalc() {
    var rows = document.querySelectorAll('.expense-row');
    /* Só mostra quando há linhas E estamos na página de Expenses */
    var pageTitle = document.querySelector('.page-title');
    if (!rows.length || !pageTitle || !/expense/i.test(pageTitle.textContent)) {
      if (_el) _el.style.display = 'none';
      return;
    }

    var total = 0, count = 0;
    rows.forEach(function (row) {
      /* Pega o último elemento de texto que contenha R$ */
      var candidates = Array.from(row.querySelectorAll('*')).filter(function (n) {
        return !n.children.length && /R\$/.test(n.textContent);
      });
      if (!candidates.length) return;
      var amtEl = candidates[candidates.length - 1];
      total += parseBRL(amtEl.textContent);
      count++;
    });

    var key = total.toFixed(2) + ':' + count;
    if (key === _lastKey) return; /* sem mudança, não reescreve DOM */
    _lastKey = key;

    /* Cria o card na primeira vez */
    if (!_el) {
      _el = document.createElement('div');
      _el.id = 'nx-total';
      _el.innerHTML =
        '<span class="nx-t-label">Total filtrado</span>' +
        '<div class="nx-t-right">' +
        '<span class="nx-t-val" id="nx-t-val"></span>' +
        '<span class="nx-t-count" id="nx-t-cnt"></span>' +
        '</div>';
    }

    /* Insere antes do card de expenses (procura o pai das expense-rows) */
    var listCard = rows[0].closest('.card');
    if (listCard && !listCard.contains(_el)) {
      listCard.parentElement.insertBefore(_el, listCard);
    }

    _el.style.display = '';
    var valEl = document.getElementById('nx-t-val');
    var cntEl = document.getElementById('nx-t-cnt');
    if (valEl) {
      valEl.textContent = fmtBRL(total);
      valEl.className = 'nx-t-val' + (total >= 0 ? ' positive' : '');
    }
    if (cntEl) cntEl.textContent = count + (count === 1 ? ' transação' : ' transações');
  }

  /* Observer com debounce — seguro contra loops */
  var _timer = null;
  new MutationObserver(function () {
    clearTimeout(_timer);
    _timer = setTimeout(recalc, 120);
  }).observe(document.body, { childList: true, subtree: true });

  setTimeout(recalc, 800);
})();

  var tabBar = document.createElement('nav');
  tabBar.id = 'nm-tabs';

  document.body.appendChild(header);
  document.body.appendChild(tabBar);

  /* Centraliza a tab ativa na barra */
  function scrollToActive() {
    var active = tabBar.querySelector('.nm-tab.active');
    if (!active) return;
    var offset = active.offsetLeft - (tabBar.clientWidth / 2) + (active.offsetWidth / 2);
    tabBar.scrollTo({ left: Math.max(0, offset), behavior: 'smooth' });
  }

  /* Sincroniza classe active sem reconstruir o DOM */
  function syncTabs() {
    var btns = document.querySelectorAll('.sidebar button.nav-item');
    var tabs = tabBar.querySelectorAll('.nm-tab');
    btns.forEach(function(b, i) {
      if (tabs[i]) tabs[i].classList.toggle('active', b.classList.contains('active'));
    });
    scrollToActive();
  }

  /* Constrói as tabs a partir dos nav-items da sidebar */
  var _builtCount = 0;

  function buildTabs() {
    var btns = document.querySelectorAll('.sidebar button.nav-item');
    if (!btns.length) return false;
    if (btns.length === _builtCount) { syncTabs(); return true; }

    _mo.disconnect();
    tabBar.innerHTML = '';
    btns.forEach(function(sb) {
      var tab = document.createElement('button');
      tab.className = 'nm-tab' + (sb.classList.contains('active') ? ' active' : '');
      var lbl = '';
      sb.childNodes.forEach(function(n) { if (n.nodeType === 3) lbl += n.textContent.trim(); });
      tab.textContent = lbl;
      (function(src) {
        tab.addEventListener('click', function() { src.click(); });
      })(sb);
      tabBar.appendChild(tab);
    });
    _builtCount = btns.length;
    scrollToActive();
    _mo.observe(document.body, { subtree: true, attributes: true, attributeFilter: ['class'] });
    return true;
  }

  /* Observer só para sincronizar o active */
  var _mo = new MutationObserver(function() { if (_builtCount) syncTabs(); });
  _mo.observe(document.body, { subtree: true, attributes: true, attributeFilter: ['class'] });

  /* Aguarda o React renderizar a sidebar */
  var _n = 0;
  var _iv = setInterval(function() { if (buildTabs() || ++_n > 60) clearInterval(_iv); }, 200);
})();

(function () {

  var REGION_MAP_KEY = 'nexo_asset_region_map';
  var LAST_AMT_KEY   = 'nexo_ni_last_amount';
  var FIXED_INCOME = ['CDB','LCI','LCA','Fund'];

  // 4 buckets — order is important (drives UI and aggressiveness scoring)
  var BUCKET_KEYS = ['rf','rvNac','rvInt','crypto'];
  var BUCKET_META = {
    rf:     { name: 'Fixed Income',         color: '#6B9E7A', riskWeight: 0   },
    rvNac:  { name: 'Domestic Equity',      color: '#E07A5F', riskWeight: 1.0 },
    rvInt:  { name: 'International Equity', color: '#4C7A99', riskWeight: 1.0 },
    crypto: { name: 'Crypto',               color: '#7A3F8F', riskWeight: 1.5 }
  };

  // Risk profiles
  var RISK_PROFILES = [
    { max: 20,  name: 'Very Conservative', color: '#3F6F50' },
    { max: 40,  name: 'Conservative',      color: '#6B9E7A' },
    { max: 60,  name: 'Moderate',          color: '#B58A3B' },
    { max: 80,  name: 'Aggressive',        color: '#D55F3E' },
    { max: 999, name: 'Very Aggressive',   color: '#7A3F8F' }
  ];

  // ── Helpers ──────────────────────────────────────────────────────────────
  function loadJSON(k, def) {
    try { return JSON.parse(localStorage.getItem(k) || def); }
    catch (e) { return JSON.parse(def); }
  }
  function saveJSON(k, v) { localStorage.setItem(k, JSON.stringify(v)); }
  function loadAssets()   { return loadJSON(ASSETS_KEY, '[]'); }
  function loadTxs()      { return loadJSON(TXS_KEY, '[]'); }
  function loadStrategy() {
    var d = loadJSON(STRATEGY_KEY, '{}');
    return {
      rf:     Number.isFinite(+d.rf)     ? +d.rf     : 50,
      rvNac:  Number.isFinite(+d.rvNac)  ? +d.rvNac  : 20,
      rvInt:  Number.isFinite(+d.rvInt)  ? +d.rvInt  : 25,
      crypto: Number.isFinite(+d.crypto) ? +d.crypto : 5
    };
  }
  function saveStrategy(s) { saveJSON(STRATEGY_KEY, s); }
  function loadRegionMap() { return loadJSON(REGION_MAP_KEY, '{}'); }
  function saveRegionMap(m) { saveJSON(REGION_MAP_KEY, m); }
  function isFixedIncome(cls) { return FIXED_INCOME.indexOf(cls) >= 0; }
  function escHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {

    });
  }
  function fmtBRL(v, d) {
    if (v == null || isNaN(v)) return 'R$ —';
    var opts = { minimumFractionDigits: d == null ? 2 : d, maximumFractionDigits: d == null ? 2 : d };
    return 'R$ ' + Math.abs(v).toLocaleString('pt-BR', opts);
  }
  function parseBR(str) {
    if (str == null) return 0;
    var s = String(str).trim().replace(/\s/g,'').replace(/R\$/g,'');
    if (s.indexOf(',') >= 0) s = s.replace(/\./g,'').replace(',', '.');
    var n = parseFloat(s);
    return isNaN(n) ? 0 : n;
  }
  function isValidRegion(r) { return r === 'BR' || r === 'INTL' || r === 'CRYPTO'; }
  function getRegion(asset, regionMap) {
    if (isValidRegion(asset.region))            return asset.region;
    if (isValidRegion(regionMap[asset.id]))     return regionMap[asset.id];
    return null; // explicitly unclassified
  }
  function classifyBucket(asset, regionMap) {
    if (isFixedIncome(asset.assetClass) || asset.assetClass === 'Cash') return 'rf';
    var r = getRegion(asset, regionMap);

    if (r === 'CRYPTO') return 'crypto';

  // ── Aggressiveness scoring ───────────────────────────────────────────────
  // Score = Σ (weight_i × pct_i). Max = 100 × 1.5 (all crypto) = 150.
  // We normalize the threshold buckets against the raw weighted score (not divided).
  // 100% RF → 0;  100% RV  → 100;  100% Crypto → 150.
  function aggressivenessScore(pcts) {
    var sum = 0, total = 0;
    BUCKET_KEYS.forEach(function (k) {
      var p = +pcts[k] || 0;
      sum += p * BUCKET_META[k].riskWeight;

  function loadStoredIbov() {

    //   Line 1:  "IBOV - Carteira do Dia DD/MM/YY"
    //   Line 2:  "Código;Ação;Tipo;Qtde. Teórica;Part. (%)"
    //   Data:    TICKER;COMPANY;TYPE;QTY;WEIGHT;

      .replace(/\bS\/A\b/g, 'SA')
      .replace(/\bS\.A\.?\b/g, 'SA')
      .replace(/[^A-Z0-9 ]+/g, ' ')

        var primary = group[0];
        var combinedWeight = group.reduce(function (sum, s) { return sum + s.weight; }, 0);
        folded.push({ ticker: primary.ticker, company: primary.company, weight: combinedWeight });
        for (var i = 1; i < group.length; i++) aliases[group[i].ticker] = primary.ticker;
      });
      stocks = folded;
    }
    stocks.sort(function (a, b) { return b.weight - a.weight; });
    var N = Math.max(3, Math.min(stocks.length || 1, settings.numStocks || 15));
    var topN = stocks.slice(0, N);
    var sum = topN.reduce(function (s, x) { return s + x.weight; }, 0);
    if (sum > 0) topN.forEach(function (x) { x.weight = x.weight / sum * 100; });
    return { stocks: topN, aliases: aliases, snapshotDate: snap.date, imported: snap.imported, totalConstituents: snap.stocks.length };
  }

  // Apply the dynamic alias map produced by getEffectiveIbov (so PETR3 → PETR4 etc.)
  function normalizeHoldingTicker(t, aliases) {
    if (!t) return '';
    var up = String(t).trim().toUpperCase();
    if (aliases && aliases[up]) return aliases[up];
    return up;
  }

  function computeIbovAllocation(domesticItems, totalDomestic, contribBR, settings) {
    var eff = getEffectiveIbov(settings);
    var universe = eff.stocks;
    var aliases = eff.aliases;
    var newTotal = totalDomestic + contribBR;

    // Aggregate user's current holdings into:
    //   stockMap  — direct holdings of universe stocks (possibly aliased)
    //   proxyTotal — sum of holdings of indexed-proxy ETFs (BOVA11 etc.)
    var stockMap = {};
    var proxyTotal = 0;
    var proxyDetails = []; // list of { ticker, position } for display
    (domesticItems || []).forEach(function (it) {
      if (!it.ticker) return;
      var up = String(it.ticker).trim().toUpperCase();
      if (INDEXED_PROXIES.indexOf(up) >= 0) {
        proxyTotal += it.position || 0;
        proxyDetails.push({ ticker: up, position: it.position || 0 });
        return;
      }
      var key = normalizeHoldingTicker(it.ticker, aliases);
      if (!key) return;
      stockMap[key] = (stockMap[key] || 0) + (it.position || 0);
    });

    // Build rows — current value combines direct holdings + decomposed proxy exposure.
    // Proxy decomposition uses the renormalized weights of the selected universe.
    var rows = universe.map(function (s) {
      var direct = stockMap[s.ticker] || 0;
      var fromProxy = proxyTotal * s.weight / 100;
      var current = direct + fromProxy;
      var targetValue = newTotal * s.weight / 100;
      return {
        ticker: s.ticker,
        company: s.company,
        weight: s.weight,
        currentValue: current,
        currentDirect: direct,
        currentFromProxy: fromProxy,
        targetValue: targetValue,
        deviationValue: targetValue - current  // positive = underweight, needs buying
      };
    });

    // Allocation: distribute contribution to positive deviations
    var posDev = rows.map(function (r) { return Math.max(0, r.deviationValue); });
    var sumPosDev = posDev.reduce(function (s, d) { return s + d; }, 0);
    var alloc = rows.map(function () { return 0; });

    if (sumPosDev <= 0) {
      // Already overweight on everything tracked — distribute proportional to target weights
      var sumW = rows.reduce(function (s, r) { return s + r.weight; }, 0);
      if (sumW > 0) rows.forEach(function (r, i) { alloc[i] = contribBR * r.weight / sumW; });
    } else if (sumPosDev >= contribBR) {
      // Aporte cabe dentro dos gaps — proporcional ao deviation
      rows.forEach(function (r, i) { alloc[i] = (posDev[i] / sumPosDev) * contribBR; });
    } else {
      // Cobre todos os gaps, distribui sobra proporcional aos pesos
      var leftover = contribBR - sumPosDev;
      var sumW2 = rows.reduce(function (s, r) { return s + r.weight; }, 0);
      rows.forEach(function (r, i) { alloc[i] = posDev[i] + (sumW2 > 0 ? leftover * r.weight / sumW2 : 0); });
    }

    // Apply minimum per stock — collapse small allocations into a "remaining cash" bucket
    var minP = +settings.minPerStock || 0;
    var remaining = 0;
    if (minP > 0) {
      // Iterative: drop the smallest allocations below min, redistribute their share
      var changed = true;
      while (changed) {
        changed = false;
        var validIdx = [];
        var validSum = 0;
        var droppedSum = 0;
        rows.forEach(function (r, i) {
          if (alloc[i] >= minP) { validIdx.push(i); validSum += alloc[i]; }
          else { droppedSum += alloc[i]; alloc[i] = 0; }
        });
        if (droppedSum > 0 && validIdx.length > 0) {
          // Try to redistribute droppedSum proportionally among valid (by deviation if any pos, else by weight)
          var basis = validIdx.map(function (i) { return posDev[i] > 0 ? posDev[i] : rows[i].weight; });
          var basisSum = basis.reduce(function (s, x) { return s + x; }, 0);
          if (basisSum > 0) {
            validIdx.forEach(function (i, j) { alloc[i] += droppedSum * basis[j] / basisSum; });
            changed = true;
          } else {
            remaining += droppedSum;
          }
        } else if (droppedSum > 0) {
          // No valid recipients — keep as remaining
          remaining += droppedSum;
        }
      }
    }

    rows.forEach(function (r, i) { r.buy = alloc[i]; });
    var allocated = rows.reduce(function (s, r) { return s + r.buy; }, 0);
    if (allocated < contribBR - 0.005) remaining += (contribBR - allocated);

    return { rows: rows, remaining: remaining, newTotal: newTotal, universeSize: universe.length, proxyTotal: proxyTotal, proxyDetails: proxyDetails };
  }

  function computeTrackingDeviation(rows, base) {
    // L1 distance (sum of absolute % gaps across the Ibov universe)
    if (!rows.length || base <= 0) return 0;
    return rows.reduce(function (s, r) {
      var curPct = (r.currentValue / base) * 100;
      return s + Math.abs(curPct - r.weight);
    }, 0);
  }
  function computeTrackingDeviationAfter(rows, base) {
    if (!rows.length || base <= 0) return 0;
    return rows.reduce(function (s, r) {
      var newVal = r.currentValue + (r.buy || 0);
      var newPct = (newVal / base) * 100;
      return s + Math.abs(newPct - r.weight);
    }, 0);
  }

  // ── Portfolio computation (mirrors calcPortfolio) ─────────────────────────
  function computeBuckets() {
    var assets = loadAssets();
    var txs = loadTxs();
    var regionMap = loadRegionMap();
    var buckets = {
      rf:     { total: 0, items: [] },
      rvNac:  { total: 0, items: [] },
      rvInt:  { total: 0, items: [] },
      crypto: { total: 0, items: [] }
    };
    var unclassifiedRV = [];

    assets.forEach(function (asset) {
      var myTxs = txs.filter(function (t) { return t.assetId === asset.id; });
      var fi = isFixedIncome(asset.assetClass);
      var qtyNet = 0, weightedBuyCost = 0, totalBuyQty = 0;
      var totalBuyAmt = 0, totalSellAmt = 0;
      myTxs.forEach(function (t) {
        var qty = parseFloat(t.quantity) || 1;
        var amt = parseFloat(t.amount)   || 0;
        if (t.type === 'buy' || t.type === 'adjustment') {
          qtyNet          += fi ? 0 : qty;
          weightedBuyCost += fi ? 0 : amt * qty;
          totalBuyQty     += fi ? 0 : qty;
          totalBuyAmt     += fi ? amt : 0;
        } else if (t.type === 'sell') {
          qtyNet       -= fi ? 0 : qty;
          totalSellAmt += fi ? amt : 0;
        }
      });
      var manualPrice = parseFloat(asset.manualUnitPrice) || 0;
      var position;
      if (!fi) {
        position = qtyNet * manualPrice;
        if (position <= 0) {
          var avg = totalBuyQty > 0 ? weightedBuyCost / totalBuyQty : 0;
          position = avg * qtyNet;
        }
      } else {
        position = manualPrice;
        if (position <= 0) position = totalBuyAmt - totalSellAmt;
      }
      if (position <= 0 || isNaN(position)) return;

      var explicitRegion = isValidRegion(asset.region) || isValidRegion(regionMap[asset.id]);
      var bucket = classifyBucket(asset, regionMap);
      var item = {
        id: asset.id,
        name: asset.name,
        ticker: asset.ticker,
        assetClass: asset.assetClass,
        position: position,
        region: getRegion(asset, regionMap),  // may be null
        explicitRegion: explicitRegion,
        fi: fi
      };
      buckets[bucket].total += position;
      buckets[bucket].items.push(item);
      if (!fi && !explicitRegion) unclassifiedRV.push(item);
    });

    var total = buckets.rf.total + buckets.rvNac.total + buckets.rvInt.total + buckets.crypto.total;
    return { buckets: buckets, total: total, unclassifiedRV: unclassifiedRV };
  }

  // ── Rebalancing logic ────────────────────────────────────────────────────
  function computeAllocation(buckets, total, strategy, X) {
    var sumPct = BUCKET_KEYS.reduce(function (s, k) { return s + (+strategy[k] || 0); }, 0);
    if (sumPct <= 0) return null;
    var pct = {};
    BUCKET_KEYS.forEach(function (k) { pct[k] = (+strategy[k] || 0) / sumPct; });
    var newTotal = total + X;
    var targetVal = {};
    var gap = {};
    var alloc = {};
    BUCKET_KEYS.forEach(function (k) {
      targetVal[k] = newTotal * pct[k];
      gap[k] = Math.max(0, targetVal[k] - buckets[k].total);
      alloc[k] = 0;
    });
    var sumGap = BUCKET_KEYS.reduce(function (s, k) { return s + gap[k]; }, 0);

    if (sumGap <= 0) {
      BUCKET_KEYS.forEach(function (k) { alloc[k] = X * pct[k]; });
    } else if (sumGap >= X) {
      BUCKET_KEYS.forEach(function (k) { alloc[k] = (gap[k] / sumGap) * X; });
    } else {
      var leftover = X - sumGap;
      BUCKET_KEYS.forEach(function (k) { alloc[k] = gap[k] + leftover * pct[k]; });
    }
    var newPos = {};
    BUCKET_KEYS.forEach(function (k) { newPos[k] = buckets[k].total + alloc[k]; });
    return { pct: pct, targetVal: targetVal, gap: gap, alloc: alloc, newPos: newPos, newTotal: newTotal };
  }
