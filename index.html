  // ── Risk gauge ───────────────────────────────────────────────────────────
  function renderRiskGauge(strategy, currentPcts) {
    var targetScore = aggressivenessScore(strategy);
    var currentScore = aggressivenessScore(currentPcts);
    var targetProfile = riskProfileFor(targetScore);
    var currentProfile = riskProfileFor(currentScore);
    function pos(score) { return Math.max(0, Math.min(100, (score / 100) * 100)); }
    return '<div class="nxni-risk">' +
      '<div class="nxni-risk-row">' +
        '<div class="nxni-risk-label">Target portfolio risk</div>' +
        '<div class="nxni-risk-name" style="color:' + targetProfile.color + '">' + targetProfile.name + '</div>' +
        '<div class="nxni-risk-bar"><div class="nxni-risk-marker" style="left:' + pos(targetScore).toFixed(1) + '%"></div></div>' +
        '<div class="nxni-risk-scale"><span>Conservative</span><span>Moderate</span><span>Aggressive</span></div>' +
      '</div>' +
      (currentPcts._hasData ?
        '<div class="nxni-risk-row">' +
          '<div class="nxni-risk-label">Current portfolio risk</div>' +
          '<div class="nxni-risk-name" style="color:' + currentProfile.color + '">' + currentProfile.name + '</div>' +
          '<div class="nxni-risk-bar"><div class="nxni-risk-marker" style="left:' + pos(currentScore).toFixed(1) + '%"></div></div>' +
          '<div class="nxni-risk-scale"><span>Conservative</span><span>Moderate</span><span>Aggressive</span></div>' +
        '</div>' : '') +
    '</div>';
  }

  function gapClass(curPct, targetPct) {
    var d = curPct - targetPct;
    if (Math.abs(d) < 0.5) return 'ok';
    return d < 0 ? 'under' : 'over';
  }
  function gapLabel(curPct, targetPct) {
    var d = curPct - targetPct;
    if (Math.abs(d) < 0.05) return 'on target';
    return (d > 0 ? '+' : '') + d.toFixed(1) + ' p.p.';
  }

  function renderStrategySection(s, buckets, total) {
    var sum = BUCKET_KEYS.reduce(function (a, k) { return a + (+s[k] || 0); }, 0);
    var ok = Math.abs(sum - 100) < 0.01;
    // Compute current portfolio % for the gauge
    var currentPcts = { _hasData: total > 0 };
    BUCKET_KEYS.forEach(function (k) {
      currentPcts[k] = total > 0 ? (buckets[k].total / total) * 100 : 0;
    });

    var stratHtml = '<div class="nxni-strategy">';
    BUCKET_KEYS.forEach(function (k) {
      stratHtml +=
        '<div class="nxni-strategy-row">' +
          '<span class="nxni-strategy-label" style="background:' + BUCKET_META[k].color + '">' + BUCKET_META[k].name + '</span>' +
          '<input type="number" min="0" max="100" step="0.5" data-strat="' + k + '" value="' + (+s[k] || 0) + '" />' +
          '<span class="nxni-strategy-pct">%</span>' +
        '</div>';
    });
    stratHtml += '</div>';

    return '' +
      '<div class="nxni-card">' +
        '<div class="nxni-card-title">Target strategy</div>' +
        '<div class="nxni-card-sub">Define the desired percentage for each class. The total must be 100%.</div>' +
        '<div class="nxni-strategy-wrap">' +
          '<div>' +
            stratHtml +
            '<div class="nxni-strategy-total ' + (ok ? 'ok' : 'bad') + '" id="nxni-total-pct">Total: <strong>' + sum.toFixed(1) + '%</strong></div>' +
            '<div style="display:flex;align-items:center;margin-top:4px">' +
              '<button class="nxni-btn nxni-btn-primary" data-action="save-strategy" ' + (ok ? '' : 'disabled') + '>Save strategy</button>' +
              '<span class="nxni-saved-msg" id="nxni-saved-msg">Saved</span>' +
            '</div>' +
          '</div>' +
          renderRiskGauge(s, currentPcts) +
        '</div>' +
      '</div>';
  }

  function renderCurrentSection(buckets, total, strategy, unclassifiedRV) {
    if (total <= 0) {
      return '<div class="nxni-card"><div class="nxni-empty">Your portfolio has no positions yet. Add assets and transactions to view current allocation.</div></div>';
    }
    var html = '<div class="nxni-card">' +
      '<div class="nxni-card-title">Current allocation</div>' +
      '<div class="nxni-card-sub">Portfolio total: <strong>' + fmtBRL(total) + '</strong></div>' +
      '<div class="nxni-grid-row">';
    BUCKET_KEYS.forEach(function (k) {
      var b = buckets[k];
      var curPct = total > 0 ? (b.total / total) * 100 : 0;
      var tgtPct = +strategy[k] || 0;
      var gc = gapClass(curPct, tgtPct);
      html += '<div class="nxni-bucket-card">' +
        '<div class="nxni-bucket-name" style="color:' + BUCKET_META[k].color + '">' + BUCKET_META[k].name + '</div>' +
        '<div class="nxni-bucket-val">' + fmtBRL(b.total) + '</div>' +
        '<div class="nxni-bucket-detail">' + curPct.toFixed(1) + '% current · ' + tgtPct.toFixed(1) + '% target</div>' +
        '<span class="nxni-bucket-gap ' + gc + '">' + gapLabel(curPct, tgtPct) + '</span>' +
      '</div>';
    });
    html += '</div>';

    // Collect every ETF/Fund position across the three equity buckets for region editing
    var allEquity = [];
    ['rvNac','rvInt','crypto'].forEach(function (k) {
      buckets[k].items.forEach(function (it) { if (!it.fi) allEquity.push(it); });
    });
    // Unclassified come first (highlighted), then the rest
    if (unclassifiedRV && unclassifiedRV.length > 0) {
      html += '<div class="nxni-unclass"><div class="nxni-unclass-title">' +
        unclassifiedRV.length + ' ETF/Fund without region defined. Please classify:</div>';
      unclassifiedRV.forEach(function (it) {
        html += '<div class="nxni-unclass-row"><span class="nm">' +
          escHtml(it.name) + (it.ticker ? ' <span style="color:#999">(' + escHtml(it.ticker) + ')</span>' : '') +
          '</span><select data-region-for="' + escHtml(it.id) + '">' +
          '<option value="" selected>— Select region —</option>' +
          '<option value="BR">Domestic (BR)</option>' +
          '<option value="INTL">International</option>' +
          '<option value="CRYPTO">Crypto</option>' +
          '</select></div>';
      });
      html += '</div>';
    }
    // Manage classifications — always available so the user can fix mistakes
    var classified = allEquity.filter(function (it) { return it.explicitRegion; });
    if (classified.length > 0) {
      html += '<details class="nxni-manage"><summary>Manage classifications (' + classified.length + ' asset' + (classified.length === 1 ? '' : 's') + ')</summary>';
      classified.forEach(function (it) {
        html += '<div class="nxni-unclass-row"><span class="nm">' +
          escHtml(it.name) + (it.ticker ? ' <span style="color:#999">(' + escHtml(it.ticker) + ')</span>' : '') +
          '</span><select data-region-for="' + escHtml(it.id) + '">' +
          '<option value="BR" ' + (it.region === 'BR' ? 'selected' : '') + '>Domestic (BR)</option>' +
          '<option value="INTL" ' + (it.region === 'INTL' ? 'selected' : '') + '>International</option>' +
          '<option value="CRYPTO" ' + (it.region === 'CRYPTO' ? 'selected' : '') + '>Crypto</option>' +
          '</select></div>';
      });
      html += '</details>';
    }
    html += '</div>';
    return html;
  }

  function renderInputSection(amount) {
    var amtFmt = amount > 0 ? amount.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '';
    return '<div class="nxni-card">' +
      '<div class="nxni-card-title">New contribution</div>' +
      '<div class="nxni-card-sub">How much do you have available to invest right now?</div>' +
      '<div class="nxni-amt-wrap">' +
        '<span class="nxni-amt-prefix">R$</span>' +
        '<input class="nxni-amt-input" type="text" id="nxni-amount" inputmode="decimal" placeholder="0,00" value="' + escHtml(amtFmt) + '" />' +
        '<button class="nxni-btn nxni-btn-primary" data-action="calc">Calculate</button>' +
      '</div>' +
    '</div>';
  }

  function renderResultSection(buckets, total, strategy, amount) {
    if (!amount || amount <= 0) return '';
    var r = computeAllocation(buckets, total, strategy, amount);
    if (!r) return '';
    var html = '<div class="nxni-card">' +
      '<div class="nxni-card-title">Suggested allocation</div>' +
      '<div class="nxni-card-sub">Distributing <strong>' + fmtBRL(amount) + '</strong> to align the portfolio with your strategy.</div>' +
      '<div class="nxni-result">';
    BUCKET_KEYS.forEach(function (k) {
      var v = r.alloc[k];
      var pct = amount > 0 ? (v / amount) * 100 : 0;
      html += '<div class="nxni-result-card" style="background:' + BUCKET_META[k].color + '">' +
        '<div class="nxni-result-name">' + BUCKET_META[k].name + '</div>' +
        '<div class="nxni-result-val">' + fmtBRL(v) + '</div>' +
        '<div class="nxni-result-pct">' + pct.toFixed(1) + '% of contribution</div>' +
      '</div>';
    });
    html += '</div>';
    html += '<div style="margin-top:6px;font-size:13px;font-weight:600;margin-bottom:8px">Portfolio after contribution (' + fmtBRL(r.newTotal) + '):</div>' +
      '<div class="nxni-after-row">';
    BUCKET_KEYS.forEach(function (k) {
      var newPct = r.newTotal > 0 ? (r.newPos[k] / r.newTotal) * 100 : 0;
      var tgtPct = +strategy[k] || 0;
      html += '<div><span style="color:' + BUCKET_META[k].color + '">●</span> ' +
        BUCKET_META[k].name + ': <strong>' + newPct.toFixed(1) + '%</strong> ' +
        '<span style="opacity:.6">(target ' + tgtPct.toFixed(1) + '%)</span></div>';
    });
    html += '</div></div>';
    // Append Brazilian Equity Contribution Assistant below the suggested allocation
    html += renderBrazilianAssistant(buckets, total, r, state.beaSettings);
    return html;
  }

  function renderPage() {
    if (!_container) return;
    var data = computeBuckets();
    var html = '<h1>New investments</h1>' +
      '<div class="nxni-sub">Distribute a new contribution across your asset classes following your strategy.</div>' +
      renderStrategySection(state.strategy, data.buckets, data.total) +
      renderCurrentSection(data.buckets, data.total, state.strategy, data.unclassifiedRV) +
      renderInputSection(state.amount) +
      (state.showResult ? renderResultSection(data.buckets, data.total, state.strategy, state.amount) : '');
    _container.innerHTML = html;
    wireEvents();
  }

  function wireEvents() {
    if (!_container) return;
    Array.from(_container.querySelectorAll('input[data-strat]')).forEach(function (inp) {
      inp.addEventListener('input', function () {
        var key = inp.getAttribute('data-strat');
        var v = parseFloat(inp.value);
        if (isNaN(v)) v = 0;
        state.strategy[key] = v;
        state.dirtyStrategy = true;
        var sum = BUCKET_KEYS.reduce(function (a, k) { return a + (+state.strategy[k] || 0); }, 0);
        var totEl = _container.querySelector('#nxni-total-pct');
        if (totEl) {
          totEl.innerHTML = 'Total: <strong>' + sum.toFixed(1) + '%</strong>';
          totEl.classList.toggle('ok', Math.abs(sum-100) < 0.01);
          totEl.classList.toggle('bad', Math.abs(sum-100) >= 0.01);
        }
        var saveBtn = _container.querySelector('[data-action="save-strategy"]');
        if (saveBtn) saveBtn.disabled = Math.abs(sum-100) >= 0.01;
        var score = aggressivenessScore(state.strategy);
        var profile = riskProfileFor(score);
        var riskRow = _container.querySelector('.nxni-risk-row');
        if (riskRow) {
          var nameEl = riskRow.querySelector('.nxni-risk-name');
          var marker = riskRow.querySelector('.nxni-risk-marker');
          if (nameEl) { nameEl.textContent = profile.name; nameEl.style.color = profile.color; }
          if (marker) marker.style.left = Math.max(0, Math.min(100, score)).toFixed(1) + '%';
        }
      });
    });
    var amtEl = _container.querySelector('#nxni-amount');
    if (amtEl) {
      amtEl.addEventListener('input', function () {
        var digits = amtEl.value.replace(/\D/g, '');
        var cents = parseInt(digits || '0', 10);
        var fmt = (cents / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        amtEl.value = fmt;
        try { amtEl.setSelectionRange(fmt.length, fmt.length); } catch (e) {}
      });
      amtEl.addEventListener('focus', function () { amtEl.select(); });
      amtEl.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') { e.preventDefault(); doCalculate(); }
      });
    }
    _container.addEventListener('click', function (e) {
      var t = e.target.closest('[data-action]');
      if (!t) return;
      var act = t.getAttribute('data-action');
      if (act === 'save-strategy') doSaveStrategy();
      else if (act === 'calc')     doCalculate();
      else if (act === 'bea-import') {
        var inp = _container.querySelector('input[data-bea="csv-input"]');
        if (inp) inp.click();
      }
      else if (act === 'bea-reset') {
        if (confirm('Remove the imported Ibovespa composition and use the embedded snapshot?')) {
          clearStoredIbov();
          renderPage();
        }
      }
    });

    // CSV file input handler
    var csvInp = _container.querySelector('input[data-bea="csv-input"]');
    if (csvInp) {
      csvInp.addEventListener('change', function (e) {
        var file = csvInp.files && csvInp.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function (ev) {
          try {
            var buf = ev.target.result;
            var text;
            if (buf instanceof ArrayBuffer && typeof TextDecoder !== 'undefined') {
              try { text = new TextDecoder('iso-8859-1', { fatal: false }).decode(buf); }
              catch (e1) {
                // Older browsers may not know 'iso-8859-1' — fall back to manual byte mapping
                var bytes = new Uint8Array(buf), s = '';
                for (var k = 0; k < bytes.length; k++) s += String.fromCharCode(bytes[k]);
                text = s;
              }
            } else {
              text = String(buf || '');
            }
            console.log('[Nexo BEA] CSV read,', text.length, 'chars, first 80:', text.slice(0,80));
            var parsed = parseB3IbovCSV(text);
            console.log('[Nexo BEA] parsed', parsed.stocks.length, 'stocks');
            saveStoredIbov(parsed);
            renderPage();
            var msg = _container.querySelector('#nxni-bea-msg');
            if (msg) { msg.textContent = '✓ Imported ' + parsed.stocks.length + ' stocks (Carteira ' + (parsed.compositionDate || '') + ').'; msg.className = 'nxni-bea-source-msg ok'; }
          } catch (err) {
            var msg2 = _container.querySelector('#nxni-bea-msg');
            if (msg2) { msg2.textContent = '✗ ' + (err && err.message ? err.message : 'Failed to parse the CSV.'); msg2.className = 'nxni-bea-source-msg err'; }
            else alert('Failed to parse CSV: ' + (err && err.message ? err.message : err));
          }
          csvInp.value = ''; // allow re-upload of same file
        };
        reader.onerror = function () {
          var msg3 = _container.querySelector('#nxni-bea-msg');
          if (msg3) { msg3.textContent = '✗ Could not read the file.'; msg3.className = 'nxni-bea-source-msg err'; }
        };
        // B3 ships the CSV as ISO-8859-1. Use ArrayBuffer + TextDecoder for reliable
        // cross-browser decoding (readAsText's encoding parameter is poorly supported).
        reader.readAsArrayBuffer(file);
      });
    }
    // BEA controls — skip file inputs (handled separately)
    Array.from(_container.querySelectorAll('[data-bea]')).forEach(function (el) {
      if (el.type === 'file') return;
      var key = el.getAttribute('data-bea');
      var evt = el.type === 'checkbox' ? 'change' : 'input';
      el.addEventListener(evt, function () {
        var v;
        if (el.type === 'checkbox') v = el.checked;
        else { v = parseFloat(el.value); if (isNaN(v)) v = 0; }
        state.beaSettings[key] = v;
        saveBEASettings(state.beaSettings);
        renderPage();
      });
    });
    Array.from(_container.querySelectorAll('select[data-region-for]')).forEach(function (sel) {
      sel.addEventListener('change', function () {
        var id = sel.getAttribute('data-region-for');
        var v = sel.value;
        if (!isValidRegion(v)) return;
        var map = loadRegionMap();
        map[id] = v;
        saveRegionMap(map);
        renderPage();
      });
    });
  }

  function doSaveStrategy() {
    var sum = BUCKET_KEYS.reduce(function (a, k) { return a + (+state.strategy[k] || 0); }, 0);
    if (Math.abs(sum - 100) >= 0.01) return;
    saveStrategy(state.strategy);
    state.dirtyStrategy = false;
    var msg = _container.querySelector('#nxni-saved-msg');
    if (msg) {
      msg.classList.add('show');
      setTimeout(function () { msg.classList.remove('show'); }, 1800);
    }
    renderPage();
  }

  function doCalculate() {
    var amtEl = _container.querySelector('#nxni-amount');
    var v = amtEl ? parseBR(amtEl.value) : 0;
    state.amount = v;
    state.showResult = v > 0;
    localStorage.setItem(LAST_AMT_KEY, String(v));
    renderPage();
    var res = _container.querySelector('.nxni-result');
    if (res) res.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function mount() {
    if (_mounted) return;
    var main = document.querySelector('.main');
    if (!main) { setTimeout(mount, 100); return; }
    injectCSS();
    Array.from(main.children).forEach(function (el) {
      if (el.id === 'nx-ni-root') return;
      el.dataset.nxNiHidden = '1';
      el.style.display = 'none';
    });
    _container = document.createElement('div');
    _container.id = 'nx-ni-root';
    main.appendChild(_container);
    _mounted = true;
    state.strategy = loadStrategy();
    state.amount = parseFloat(localStorage.getItem(LAST_AMT_KEY) || '0') || 0;
    state.showResult = state.amount > 0;
    renderPage();
  }
  function unmount() {
    if (!_mounted) return;
    if (_container && _container.parentNode) _container.parentNode.removeChild(_container);
    _container = null;
    _mounted = false;
    var main = document.querySelector('.main');
    if (main) {
      Array.from(main.children).forEach(function (el) {
        if (el.dataset && el.dataset.nxNiHidden === '1') {
          el.style.display = '';
          delete el.dataset.nxNiHidden;
        }
      });
    }
  }

  function check() {
    var active = isNovosInvActive();
    if (active === _lastActive) return;
    _lastActive = active;
    if (active) mount(); else unmount();
  }
  new MutationObserver(check).observe(document.body, {
    subtree: true,
    attributes: true,
    attributeFilter: ['class', 'data-nx-ni-tick']
  });
  document.addEventListener('click', function (e) {
    var clicked = e.target && e.target.closest && e.target.closest('.sidebar button.nav-item');
    if (clicked && !clicked.hasAttribute('data-novosinv')) {
      var mine = document.querySelector('.sidebar button.nav-item[data-novosinv]');
      if (mine && mine.classList.contains('active')) mine.classList.remove('active');
      setTimeout(check, 0);
    }
  }, true);
  setTimeout(check, 700);
  setTimeout(check, 1500);
})();
  </script>

  </body>
</html>
